<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Elpriser">
<meta name="theme-color" content="#F3FAF6" id="theme-color">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@500;600;700;800&family=Unbounded:wght@400;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Elpriser</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:'Figtree',-apple-system,BlinkMacSystemFont,sans-serif;color:#11352b;
    background:#F3FAF6;transition:background .25s;min-height:100vh;
    -webkit-font-smoothing:antialiased}
  #app{max-width:430px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 10px) 20px calc(env(safe-area-inset-bottom) + 32px);position:relative;min-height:100vh}
  button{font-family:inherit}
  @keyframes slideup{0%{transform:translateY(100%)}100%{transform:translateY(0)}}
  @keyframes fadein{0%{opacity:0}100%{opacity:1}}
  @keyframes pop{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
  .pane{animation:pop .22s ease}
  .spin{animation:spin .7s linear}
  @keyframes spin{to{transform:rotate(360deg)}}
  .bar{transition:height .45s cubic-bezier(.2,.8,.2,1)}
  .skel{padding:60px 0;text-align:center;color:#7c8a83;font-weight:600}
  #sheet-root{position:fixed;inset:0;z-index:60;display:none}
  #sheet-root.open{display:block}
  .sheet-back{position:absolute;inset:0;background:rgba(8,12,18,.5);animation:fadein .2s ease}
  .sheet{position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:430px;
    max-height:92%;overflow-y:auto;border-radius:28px 28px 0 0;padding:10px 20px calc(env(safe-area-inset-bottom) + 28px);
    animation:slideup .28s cubic-bezier(.2,.9,.2,1)}

  /* ===== VOLT MASCOT — base + statisk tilstand (altid, også reduced-motion) ===== */
  .char{transform-box:fill-box;transform-origin:center}
  .bolt{transform-box:fill-box;transform-origin:center}
  .eye,.pupil{transform-box:fill-box;transform-origin:center}
  .brow,.mouth-mad,.spark,.sparkle{opacity:0}
  /* statisk pris-tier-udtryk (farve/ansigt) — IKKE animation, så tier er synlig uden bevægelse */
  .cheap .bolt{fill:#34B27B}
  .expensive .eye{transform:scaleY(.5)}
  .expensive .mouth-happy{opacity:0}
  .expensive .mouth-mad{opacity:1}
  .expensive .brow{opacity:1}

  /* ===== VOLT MASCOT — bevægelse (kun når brugeren tillader animation) ===== */
  @media (prefers-reduced-motion: no-preference){
    @keyframes blink{0%,46%,54%,100%{transform:scaleY(1)}50%{transform:scaleY(.12)}}
    @keyframes pupilHide{0%,46%,54%,100%{opacity:1}50%{opacity:0}}
    .blink .eye{animation:blink 4s ease-in-out infinite}
    .blink .pupil{animation:pupilHide 4s ease-in-out infinite}

    @keyframes float{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-7px) rotate(4deg)}}
    .idle .char,.mid .char{animation:float 3s ease-in-out infinite}
    .idle .eye,.mid .eye{animation:blink 4s ease-in-out infinite}
    .idle .pupil,.mid .pupil{animation:pupilHide 4s ease-in-out infinite}

    @keyframes hop{
      0%,100%{transform:translateY(0) scale(1,1)}
      15%{transform:translateY(0) scale(1.12,.85)}
      40%{transform:translateY(-24px) scale(.9,1.15)}
      70%{transform:translateY(0) scale(1.1,.9)}
      85%{transform:translateY(0) scale(.98,1.02)}}
    @keyframes glowGreen{0%,100%{filter:drop-shadow(0 0 2px rgba(52,178,123,.4))}
      50%{filter:drop-shadow(0 0 12px rgba(52,178,123,.85))}}
    @keyframes sparklePop{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:1;transform:scale(1.1)}}
    @keyframes cheapDance{
      0%{transform:translateY(0) scale(1,1) rotate(0)}
      7%{transform:translateY(0) scale(1.12,.85) rotate(0)}
      20%{transform:translateY(-24px) scale(.9,1.15) rotate(0)}
      33%{transform:translateY(0) scale(1.1,.9) rotate(0)}
      44%{transform:translateY(0) scale(1) rotate(0)}
      52%{transform:translateY(0) scale(1) rotate(0)}
      60%{transform:translateY(0) scale(1.05) rotate(-20deg)}
      90%{transform:translateY(0) scale(1.05) rotate(380deg)}
      100%{transform:translateY(0) scale(1) rotate(360deg)}}
    .cheap{animation:glowGreen 1s ease-in-out infinite}
    .cheap .char{animation:cheapDance 2.8s ease-in-out infinite;transform-origin:center}
    .cheap .eye{animation:blink 3.4s ease-in-out infinite}
    .cheap .pupil{animation:pupilHide 3.4s ease-in-out infinite}
    .cheap .sparkle{transform-box:fill-box;transform-origin:center;animation:sparklePop 1s ease-in-out infinite}
    .cheap .sparkle:nth-of-type(2){animation-delay:.33s}
    .cheap .sparkle:nth-of-type(3){animation-delay:.66s}

    @keyframes buzz{0%,100%{transform:translate(0,0) rotate(0)}
      20%{transform:translate(-1.8px,1px) rotate(-3deg)}
      40%{transform:translate(1.8px,-1px) rotate(3deg)}
      60%{transform:translate(-1.2px,-1px) rotate(-2deg)}
      80%{transform:translate(1.2px,1px) rotate(2deg)}}
    @keyframes zapRed{0%,100%{fill:#E5604D}40%{fill:#FF2F52}70%{fill:#ffc2cc}}
    @keyframes glowRed{0%,100%{filter:drop-shadow(0 0 2px rgba(229,96,77,.5))}
      50%{filter:drop-shadow(0 0 14px rgba(255,47,82,.95))}}
    @keyframes crackle{0%,100%{opacity:0}45%{opacity:0}50%{opacity:1}55%{opacity:0}}
    .expensive{animation:glowRed .3s ease-in-out infinite}
    .expensive .char{animation:buzz .17s linear infinite}
    .expensive .bolt{animation:zapRed .35s steps(1) infinite}

    @keyframes charge{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
    @keyframes glowY{0%,100%{filter:drop-shadow(0 0 0 rgba(255,210,63,0))}50%{filter:drop-shadow(0 0 10px rgba(255,210,63,.95))}}
    .charge{animation:glowY .6s ease-in-out infinite}
    .charge .char{animation:charge .6s ease-in-out infinite}

    @keyframes cheer{0%{transform:rotate(0) scale(1)}35%{transform:rotate(-18deg) scale(1.05)}70%{transform:rotate(380deg) scale(1.05)}100%{transform:rotate(360deg) scale(1)}}
    .cheer .char{animation:cheer 1.1s cubic-bezier(.4,1.4,.5,1) infinite}
  }
</style>
</head>
<body>
  <div id="app"><div class="skel">Henter elpriser…</div></div>
  <div id="sheet-root"><div class="sheet-back" onclick="closeSettings()"></div><div class="sheet" id="sheet"></div></div>

<script type="module">
"use strict";
import {
  DSO_TARIFFS, parseDK, totalOf, tierOf, loHi, bestWindow, seriesForDay, tierClass, componentsOf
} from './pricing.js';
import { getAccessToken, getMeteringPoints, getTimeSeries, parseTimeSeries } from './eloverblik.js';
import { verifyClaim, pointsFor, smartScore, badgeUpdates } from './gamify.js';

/* ===================== PRIS-MOTOR (rigtige data) ===================== */
const DAYS=['søndag','mandag','tirsdag','onsdag','torsdag','fredag','lørdag'];
function pad(n){return String(n).padStart(2,'0');}
function kr(ore){return (ore/100).toFixed(2).replace('.',',');}
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ===================== THEMES ===================== */
const THEMES={
  soft:{ bg:'#F3FAF6', sheetBg:'#ffffff', text:'#11352b', muted:'#7c8a83', border:'#e3ede8',
    surface:'#F1F7F4', accent:'#1c7a4d', accentText:'#ffffff', accentSoft:'#E3F7EC',
    pal:['#34B27B','#F4B740','#E5604D'], ring:'#11352b', axis:'rgba(17,53,43,.45)',
    tab:{track:'#E4F1EA',on:'#11352b',onText:'#fff',off:'#5a7d72'} },
  bold:{ bg:'#0C1117', sheetBg:'#131A22', text:'#EAF2E9', muted:'#7E8C99', border:'#26323d',
    surface:'#0F1620', accent:'#C6FF3D', accentText:'#0C1117', accentSoft:'#1c2a16',
    pal:['#C6FF3D','#FFD23F','#FF5C7A'], ring:'#C6FF3D', axis:'rgba(234,242,233,.4)',
    tab:{track:'#1a232e',on:'#C6FF3D',onText:'#0C1117',off:'#6f7d88'} },
  play:{ bg:'#FBF4FF', sheetBg:'#ffffff', text:'#2a2140', muted:'#948aa8', border:'#efe4f8',
    surface:'#F6F1FC', accent:'#6C4BD8', accentText:'#ffffff', accentSoft:'#EDE7FB',
    pal:['#2BC48A','#FFB020','#FF5470'], ring:'#6C4BD8', axis:'rgba(42,33,64,.4)',
    tab:{track:'#EFEBFB',on:'#6C4BD8',onText:'#fff',off:'#9a8fc7'} }
};

/* Volt-mascot state machine — stateClass styres af CSS (se <style>), markup fra volt-animationer.html */
function voltSVG(stateClass, size, stroke){
  stroke = stroke || '#11352b';
  return `<svg viewBox="0 0 120 120" class="${stateClass}" width="${size}" height="${size}" style="display:block;overflow:visible;flex-shrink:0;">
    <path class="spark" d="M99 24 l-6 8 l5 1 l-6 9" fill="none" stroke="#FF2F52" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
    <path class="spark" d="M22 40 l7 6 l-4 3 l7 6" fill="none" stroke="#FF6B83" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
    <path class="spark" d="M92 84 l-2 9 l-5 -3 l-1 10" fill="none" stroke="#FF2F52" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
    <path class="sparkle" d="M100 22 l2 6 l6 2 l-6 2 l-2 6 l-2 -6 l-6 -2 l6 -2 z" fill="#34B27B"></path>
    <path class="sparkle" d="M20 36 l1.6 5 l5 1.6 l-5 1.6 l-1.6 5 l-1.6 -5 l-5 -1.6 l5 -1.6 z" fill="#7CE0A8"></path>
    <path class="sparkle" d="M90 96 l1.6 5 l5 1.6 l-5 1.6 l-1.6 5 l-1.6 -5 l-5 -1.6 l5 -1.6 z" fill="#34B27B"></path>
    <g class="char">
      <path class="bolt" d="M70 6 L30 62 L56 62 L46 114 L94 48 L66 48 Z" fill="#FFD23F" stroke="${stroke}" stroke-width="4.5" stroke-linejoin="round"></path>
      <circle class="eye eye-l" cx="55" cy="44" r="8" fill="#fff" stroke="${stroke}" stroke-width="2"></circle>
      <circle class="eye eye-r" cx="73" cy="44" r="8" fill="#fff" stroke="${stroke}" stroke-width="2"></circle>
      <circle class="pupil pupil-l" cx="57" cy="46" r="3.4" fill="${stroke}"></circle>
      <circle class="pupil pupil-r" cx="75" cy="46" r="3.4" fill="${stroke}"></circle>
      <path class="mouth-mad" d="M53 60 l4.6 -5 l4.6 5 l4.6 -5 l4.6 5 l4.6 -5" stroke="${stroke}" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
      <path class="brow brow-l" d="M47 33 L61 41" stroke="${stroke}" stroke-width="3.2" stroke-linecap="round"></path>
      <path class="brow brow-r" d="M81 33 L67 41" stroke="${stroke}" stroke-width="3.2" stroke-linecap="round"></path>
      <path class="mouth-happy" d="M54 56 Q64 64 74 56" stroke="${stroke}" stroke-width="3" fill="none" stroke-linecap="round"></path>
    </g>
  </svg>`;
}
function voltState(V){ if(app.cheerUntil && Date.now()<app.cheerUntil) return 'cheer'; return app.loading ? 'charge' : tierClass(V.nowTier); }

/* ===================== APP STATE ===================== */
const app={
  state:{ theme:'soft', region:'DK1', markup:8, bilH:4, opvaskH:2, vaskH:3, chartTab:'today', settingsOpen:false,
    selectedHour:null,
    dso:'n1',
    customTariff:{ winter:{lav:11,hoej:33,spids:99}, summer:{lav:11,hoej:17,spids:43} },
    eloverblik:{ refreshToken:'', meteringPointId:'', accessToken:'', accessTokenExp:0 },
    wizardStep:0, wizardMsg:'', meteringPoints:[] },
  raw:[], loading:true, error:null
};
function currentTariff(){
  return app.state.dso === 'custom'
    ? app.state.customTariff
    : (DSO_TARIFFS[app.state.dso] || DSO_TARIFFS.n1);
}
function cfg(){ return { markup: app.state.markup, tariff: currentTariff() }; }
function loadState(){
  try{ const s=JSON.parse(localStorage.getItem('elpriser_state')||'{}'); Object.assign(app.state,s);}catch(e){}
  app.state.settingsOpen=false;
  app.state.selectedHour=null;
  app.state.wizardStep=0;
  app.state.wizardMsg='';
  app.state.meteringPoints=[];
}
function saveState(){
  const {theme,region,markup,bilH,opvaskH,vaskH,dso,customTariff,eloverblik}=app.state;
  localStorage.setItem('elpriser_state',JSON.stringify({theme,region,markup,bilH,opvaskH,vaskH,dso,customTariff,eloverblik}));
}

/* ===================== DATA ===================== */
function dayURL(d){const y=d.getFullYear(),m=pad(d.getMonth()+1),day=pad(d.getDate());
  return `https://www.elprisenligenu.dk/api/v1/prices/${y}/${m}-${day}_${app.state.region}.json`;}
async function fetchDay(d){try{const r=await fetch(dayURL(d),{cache:'no-store'});
  if(!r.ok)return [];const j=await r.json();return Array.isArray(j)?j:[];}catch(e){return [];}}

async function load(){
  app.loading=true; app.error=null;
  const today=new Date(), tmr=new Date(); tmr.setDate(tmr.getDate()+1);
  try{
    const [a,b]=await Promise.all([fetchDay(today),fetchDay(tmr)]);
    app.raw=[...a,...b];
    if(!app.raw.length) throw new Error('ingen data');
    app.loading=false;
  }catch(e){ app.loading=false; app.error=e.message; }
  bumpStreak();
  render();
  refreshConsumption().then(verifyPending).catch(()=>{});
}

function keyOf(d){return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}

/* ===================== BEREGNINGER ===================== */
function futurePool(){
  const now=new Date(), cutoff=new Date(now.getFullYear(),now.getMonth(),now.getDate(),now.getHours());
  return app.raw.map(r=>{const t=parseDK(r.time_start);
      return {h:t.h,dayKey:t.dayKey,dow:t.dow,total:totalOf(r,cfg()),dateObj:new Date(t.y,t.monthIdx,t.d,t.h)};})
    .filter(x=>x.dateObj>=cutoff).sort((a,b)=>a.dateObj-b.dateObj);
}
function sameDay(r,d){return r.dayKey===keyOf(d);}
function isTomorrow(r){const d=new Date();d.setDate(d.getDate()+1);return sameDay(r,d);}
function winStr(w){if(!w)return '—';return pad(w.from.h)+'–'+pad((w.to.h+1)%24);}
function whenText(w){if(!w)return '—';
  const f=w.from;const day=sameDay(f,new Date())?'i dag':(isTomorrow(f)?'i morgen':DAYS[f.dow]);
  return day+' '+pad(f.h)+'–'+pad((w.to.h+1)%24);}

const KWH={bil:10,opvask:1.2,vask:1};
let STREAK=0;
function bumpStreak(){
  try{
    const today=keyOf(new Date());
    const j=JSON.parse(localStorage.getItem('elpriser_streak')||'{}');
    if(j.last===today){STREAK=j.count||1;return;}
    const y=new Date();y.setDate(y.getDate()-1);
    STREAK=(j.last===keyOf(y))?(j.count||0)+1:1;
    localStorage.setItem('elpriser_streak',JSON.stringify({last:today,count:STREAK}));
  }catch(e){STREAK=1;}
}

function loadClaims(){ try{ return JSON.parse(localStorage.getItem('elpriser_claims')||'[]'); }catch(e){ return []; } }
function saveClaims(arr){ try{ localStorage.setItem('elpriser_claims', JSON.stringify(arr)); }catch(e){} }

/* ===================== FORBRUG + GAMIFY (lokal persistens) ===================== */
function loadConsumption(){ try{ return JSON.parse(localStorage.getItem('elpriser_consumption')||'{}'); }catch(e){ return {}; } }
function saveConsumption(o){ try{ localStorage.setItem('elpriser_consumption', JSON.stringify(o)); }catch(e){} }
function loadGamify(){ try{ return JSON.parse(localStorage.getItem('elpriser_gamify')||'{}'); }catch(e){ return {}; } }
function saveGamify(g){ try{ localStorage.setItem('elpriser_gamify', JSON.stringify(g)); }catch(e){} }
function dateFromKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function isoDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function prevDayKey(k){ return keyOf(addDays(dateFromKey(k),-1)); }

async function refreshConsumption(){
  const ev=app.state.eloverblik;
  if(!ev.refreshToken || !ev.meteringPointId) return;
  const claims=loadClaims();
  const today=keyOf(new Date());
  // only fetch for pending claims whose day is in the past (data ~1-2 days delayed)
  const pending=claims.filter(c=>c.status==='pending' && c.dato!==today);
  if(!pending.length) return;
  const cons=loadConsumption();
  const needed=[...new Set(pending.map(c=>c.dato).filter(d=>!cons[d]))];
  if(!needed.length) return;
  try{
    let access=ev.accessToken;
    if(!access || Date.now()>ev.accessTokenExp){
      access=await getAccessToken(ev.refreshToken);
      ev.accessToken=access; ev.accessTokenExp=Date.now()+23*3600*1000; saveState();
    }
    const dates=needed.map(dateFromKey).sort((a,b)=>a-b);
    const from=isoDate(dates[0]); const to=isoDate(addDays(dates[dates.length-1],1));
    const json=await getTimeSeries(access, ev.meteringPointId, from, to);
    Object.assign(cons, parseTimeSeries(json));
    saveConsumption(cons);
  }catch(e){ /* non-blocking: leave pending */ }
}

function verifyPending(){
  const claims=loadClaims();
  const cons=loadConsumption();
  const g=loadGamify();
  let changed=false;
  const badgesBefore=JSON.stringify(g.badges||{});
  for(const c of claims){
    if(c.status!=='pending') continue;
    const kwh=cons[c.dato];
    if(!kwh) continue;
    const prices=c.prices||Array(24).fill(0);
    const status=verifyClaim(c, kwh, prices);
    if(status==='pending') continue;
    c.status=status; changed=true;
    if(status==='confirmed'){
      c.point=pointsFor(c, prices);
      g.totalPoint=(g.totalPoint||0)+c.point;
      // streak: consecutive days with >=1 confirmed
      if(g.lastConfirmedDate!==c.dato){
        g.streak = (g.lastConfirmedDate===prevDayKey(c.dato)) ? (g.streak||0)+1 : 1;
        g.lastConfirmedDate=c.dato;
      }
    }
  }
  if(changed){
    g.badges=badgeUpdates(g, claims);
    saveClaims(claims); saveGamify(g);
    if(JSON.stringify(g.badges)!==badgesBefore){
      // a badge flipped — celebrate
      app.cheerUntil=Date.now()+4000;
      setTimeout(()=>{ render(); }, 4100);
    }
    render();
  }
}

function claimsHTML(th){
  const today=loadClaims().filter(c=>c.dato===keyOf(new Date()));
  if(!today.length) return '';
  const emo={bil:'🚗',opvask:'🍽️',vask:'👕'};
  const chip=s=> s==='confirmed'?`<span style="color:#2BC48A;font-weight:700;">✓ bekræftet</span>`
    : s==='unconfirmed'?`<span style="color:${th.muted};">ikke bekræftet</span>`
    : `<span style="color:${th.muted};">afventer data</span>`;
  const rows=today.map(c=>`<div style="display:flex;align-items:center;gap:8px;font-size:12.5px;padding:4px 0;">
    <span>${emo[c.apparat]||'⚡'}</span><span style="flex:1;color:${th.text};">kl ${pad(c.startHour)}</span>${chip(c.status)}</div>`).join('');
  return `<div style="background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:12px 14px;margin-top:12px;">
    <div style="font-weight:800;font-size:12px;letter-spacing:.06em;color:${th.muted};margin-bottom:6px;">DINE MARKERINGER I DAG</div>${rows}</div>`;
}

function computeView(){
  const now=new Date(), nowH=now.getHours();
  const todayList=seriesForDay(app.raw, keyOf(now), cfg());
  const tmr=new Date(); tmr.setDate(tmr.getDate()+1);
  const tmrList=seriesForDay(app.raw, keyOf(tmr), cfg());
  const hasToday=todayList.length>0, hasTmr=tmrList.length>0;
  const todayVals=todayList.map(x=>x.total);
  const [loT,hiT]=hasToday?loHi(todayVals):[0,1];

  const byHour=h=>todayList.find(x=>x.h===h);
  const nowEntry=byHour(nowH);
  const nowTotal=nowEntry?nowEntry.total:(todayVals[0]??0);
  const nowTier=tierOf(nowTotal,loT,hiT);
  const peak=hasToday?Math.max(...todayVals):0;

  let ce=nowH; while(ce<24 && byHour(ce) && tierOf(byHour(ce).total,loT,hiT)===0) ce++;
  const cheapEnd=pad(Math.min(ce,24))+':00';
  let nc=-1; for(let h=nowH;h<24;h++){const e=byHour(h); if(e && tierOf(e.total,loT,hiT)===0){nc=h;break;}}
  const nextCheap=nc>=0?pad(nc)+':00':'i morgen';
  const cheapUntil = nowTier===0?cheapEnd:nextCheap;

  const pool=futurePool();
  const dayAvg=todayVals.length?todayVals.reduce((a,b)=>a+b,0)/todayVals.length:0;
  const mkAp=(key,emoji,name,verb,len,kwh)=>{const w=bestWindow(pool,len);
    const saveKr=Math.max(0,(dayAvg-(w?w.avg:dayAvg))/100*kwh);
    return {key,emoji,name,sub:len+' timers '+verb,win:winStr(w),when:whenText(w),price:kr(w?w.avg:0),save:saveKr.toFixed(0)};};
  const appliances=[
    mkAp('bil','🚗','Elbilen','ladning',app.state.bilH,KWH.bil),
    mkAp('opvask','🍽️','Opvask','program',app.state.opvaskH,KWH.opvask),
    mkAp('vask','👕','Vasketøj','program',app.state.vaskH,KWH.vask)
  ];
  const savedToday=Math.round(appliances.reduce((a,b)=>a+(+b.save),0));
  const score=hasToday?Math.round(Math.max(0,Math.min(100,(peak-nowTotal)/Math.max(1,peak-loT)*100))):0;

  const showToday=app.state.chartTab==='today';
  return {now,nowH,nowTotal,nowTier,peak,cheapUntil,cheapEnd,nextCheap,
    appliances,savedToday,score,streak:STREAK,
    todayList,tmrList,hasToday,hasTmr,

    regionLabel:app.state.region==='DK1'?'DK1 · VEST':'DK2 · ØST',regionShort:app.state.region,

}

/* ===================== CHART ===================== */
function chartHTML(list,th,nowH,opts){
  opts=opts||{};
  if(!list.length) return `<div style="padding:28px 6px;text-align:center;color:${th.muted};font-size:13px;line-height:1.6;">Morgendagens priser kommer typisk efter kl. 13.<br>Kig forbi igen senere 🙂</div>`;
  const vals=list.map(x=>x.total);
  const [lo,hi]=[Math.min(...vals),Math.max(...vals)];
  const max=hi, H=opts.h||128, gap=opts.gap||2.5;
  const bars=list.map(({h:hr,total:p})=>{
    const h=Math.max(7,Math.round(p/max*100));
    const col=th.pal[tierOf(p,lo,hi)];
    const isNow=hr===nowH;
    const isSel=hr===app.state.selectedHour;
    return `<div class="bar" onclick="selectHour(${hr})" title="kl ${pad(hr)}:00 · ${kr(p)} kr" style="flex:1 1 0;min-width:0;height:${h}%;background:${col};border-radius:5px 5px 2px 2px;position:relative;cursor:pointer;${isNow?'box-shadow:0 0 0 2.5px '+th.ring+';':''}${isSel?'outline:2px solid '+th.ring+';outline-offset:1px;':''}">${isNow?`<span style="position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:800;letter-spacing:.04em;color:${th.ring}">NU</span>`:''}</div>`;
  }).join('');
  return `<div><div style="display:flex;align-items:flex-end;gap:${gap}px;height:${H}px;padding-top:14px;">${bars}</div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:10px;font-weight:600;color:${th.axis};">
    <span>00</span><span>06</span><span>12</span><span>18</span><span>24</span></div></div>`;
}
function ringSectors(th){
  const cx=115, cy=115, rOut=115, rIn=64;
  const polar=(r,deg)=>{const a=deg*Math.PI/180; return [cx+r*Math.sin(a), cy-r*Math.cos(a)];};
  let paths='';
  for(let i=0;i<24;i++){
    const a0=i*15, a1=(i+1)*15;
    const [x0o,y0o]=polar(rOut,a0), [x1o,y1o]=polar(rOut,a1);
    const [x1i,y1i]=polar(rIn,a1),  [x0i,y0i]=polar(rIn,a0);
    const sel=i===app.state.selectedHour;
    const d=`M${x0o} ${y0o} A${rOut} ${rOut} 0 0 1 ${x1o} ${y1o} L${x1i} ${y1i} A${rIn} ${rIn} 0 0 0 ${x0i} ${y0i} Z`;
    paths+=`<path d="${d}" fill="${th.ring}" fill-opacity="${sel?0.28:0}" stroke="${sel?th.ring:'none'}" stroke-width="${sel?2:0}" style="cursor:pointer;" onclick="selectHour(${i})"></path>`;
  }
  return `<svg viewBox="0 0 230 230" width="230" height="230" style="position:absolute;left:0;top:0;">${paths}</svg>`;
}
function ringHTML(list,th,nowH){
  if(!list.length) return `<div style="padding:40px 6px;text-align:center;color:${th.muted};font-size:13px;">Morgendagens priser kommer efter kl. 13 🙂</div>`;
  const byHour=h=>list.find(x=>x.h===h);
  const vals=list.map(x=>x.total);
  const [lo,hi]=[Math.min(...vals),Math.max(...vals)];
  const pal=['#2BC48A','#FFB020','#FF5470'];
  const segs=[];
  // Urskive er bevidst fast 24-segment (i modsætning til bar-grafen som er data-drevet); manglende DST-time falder tilbage til lo.
  for(let i=0;i<24;i++){const e=byHour(i);const p=e?e.total:lo;segs.push(pal[tierOf(p,lo,hi)]+' '+(i*15)+'deg '+((i+1)*15)+'deg');}
  let dot='';
  if(nowH>=0){const a=(nowH*15+7.5)*Math.PI/180,r=92,c=115;const x=c+r*Math.sin(a),y=c-r*Math.cos(a);
    dot=`<div style="position:absolute;left:${x-9}px;top:${y-9}px;width:18px;height:18px;border-radius:50%;background:#2a2140;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);"></div>`;}
  const centerEntry=byHour(nowH>=0?nowH:list[0].h)||list[0];
  const centerVal=centerEntry.total;
  return `<div style="position:relative;width:230px;height:230px;margin:0 auto;">
    <div style="position:absolute;inset:0;border-radius:50%;background:conic-gradient(${segs.join(',')});-webkit-mask:radial-gradient(circle,transparent 56%,#000 57%);mask:radial-gradient(circle,transparent 56%,#000 57%);"></div>
    ${dot}
    ${ringSectors(th)}
    <div style="position:absolute;inset:24%;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:20px;box-shadow:0 10px 30px rgba(108,75,216,.18);">
      <div style="font-family:'Baloo 2',sans-serif;font-weight:800;font-size:30px;color:#2a2140;line-height:1;">${kr(centerVal)}</div>
      <div style="font-size:11px;font-weight:700;color:#948aa8;">kr/kWh</div></div></div>`;
}
function selectedRecord(V){
  if(app.state.selectedHour==null) return null;
  const tmr=new Date(); tmr.setDate(tmr.getDate()+1);
  const dayKey = V.chartList===V.tmrList ? keyOf(tmr) : keyOf(new Date());
  return app.raw.find(r=>{const t=parseDK(r.time_start); return t.dayKey===dayKey && t.h===app.state.selectedHour;}) || null;
}

    ${row('Spotpris (inkl. moms)',c.spot)}

  </div>`;
}

/* ===================== SETTINGS SHEET ===================== */
function customTariffHTML(th){
  const ct=app.state.customTariff;
  const cell=(seasonKey,band)=>`<div style="display:flex;align-items:center;gap:6px;">
    <button onclick="adjCustom('${seasonKey}','${band}',-1)" style="width:30px;height:30px;border-radius:9px;border:1px solid ${th.border};background:${th.surface};color:${th.text};font:inherit;font-size:17px;font-weight:700;cursor:pointer;">−</button>
    <span style="min-width:34px;text-align:center;font-weight:800;font-size:14px;">${ct[seasonKey][band]}</span>
    <button onclick="adjCustom('${seasonKey}','${band}',1)" style="width:30px;height:30px;border-radius:9px;border:1px solid ${th.border};background:${th.surface};color:${th.text};font:inherit;font-size:17px;font-weight:700;cursor:pointer;">+</button>
  </div>`;
  const col=(seasonKey,title)=>`<div style="flex:1;">
    <div style="font-size:11px;font-weight:800;color:${th.muted};margin-bottom:8px;">${title} (øre/kWh)</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:12px;color:${th.muted};">Lav</span>${cell(seasonKey,'lav')}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:12px;color:${th.muted};">Høj</span>${cell(seasonKey,'hoej')}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:12px;color:${th.muted};">Spids</span>${cell(seasonKey,'spids')}</div>
    </div></div>`;
  return `<div style="display:flex;gap:16px;background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:14px;margin-bottom:24px;">
    ${col('winter','Vinter')}${col('summer','Sommer')}</div>`;
}

function wizardHTML(th){
  const step=app.state.wizardStep;
  const msg=app.state.wizardMsg;
  const card=inner=>`<div style="background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:16px 16px 18px;">${inner}</div>`;
  const indicator=`<div style="font-size:11px;font-weight:800;letter-spacing:.08em;color:${th.muted};margin-bottom:12px;">TRIN ${step+1} AF 4</div>`;
  const pBtn=(label,fn)=>`<button onclick="${fn}" style="width:100%;margin-top:14px;padding:12px;border:none;border-radius:13px;background:${th.accent};color:${th.accentText};font:inherit;font-weight:800;font-size:14px;cursor:pointer;">${label}</button>`;
  const para=t=>`<p style="margin:0;font-size:13.5px;line-height:1.55;color:${th.text};">${t}</p>`;
  let body='';
  if(step===0){
    body=para('Hent dit eget times-forbrug fra Eloverblik, så appen kan se hvornår du faktisk bruger strøm — og belønne dig når du flytter forbrug til de billige timer. Dine data bliver på din enhed.')
      + pBtn('Kom i gang','wizardNext()');
  } else if(step===1){
    body=`<div style="font-size:13.5px;line-height:1.7;color:${th.text};">
        <div>1. Log ind på eloverblik.dk med MitID.</div>
        <div>2. Gå til Datadeling → Opret token.</div>
        <div>3. Kopiér hele nøglen.</div></div>
      <a href="https://eloverblik.dk" target="_blank" rel="noopener" style="display:block;text-align:center;margin-top:14px;padding:12px;border:1px solid ${th.border};border-radius:13px;background:transparent;color:${th.text};font:inherit;font-weight:800;font-size:14px;text-decoration:none;cursor:pointer;">Åbn eloverblik.dk →</a>`
      + pBtn('Næste','wizardNext()');
  } else if(step===2){
    const isErr=msg.startsWith('Fejl');
    const msgHTML=msg?`<div style="margin-top:10px;font-size:12.5px;font-weight:600;color:${isErr?th.pal[2]:th.muted};">${msg}</div>`:'';
    body=`<p style="margin:0 0 10px;font-size:13.5px;line-height:1.55;color:${th.text};">Indsæt din nøgle og test forbindelsen.</p>
      <textarea id="ev-token" rows="3" placeholder="Indsæt nøgle her…" style="width:100%;box-sizing:border-box;resize:vertical;border:1px solid ${th.border};border-radius:12px;background:${th.bg};color:${th.text};font:inherit;font-size:13px;padding:10px;"></textarea>${msgHTML}`
      + pBtn('Test forbindelse','testEloverblik()');
  } else {
    const mps=app.state.meteringPoints||[];
    const items=mps.length
      ? mps.map(m=>{
          const sid=String(m.id).replace(/[^0-9A-Za-z_-]/g,'');
          return `<button onclick="pickMeteringPoint('${sid}')" style="display:block;width:100%;text-align:left;margin-bottom:8px;padding:12px 14px;border:1px solid ${th.border};border-radius:13px;background:${th.bg};color:${th.text};font:inherit;font-weight:700;font-size:13.5px;cursor:pointer;">${esc(m.label)}</button>`;
        }).join('')
      : `<div style="font-size:12.5px;color:${th.muted};">Ingen målepunkter fundet.</div>`;
    body=`<p style="margin:0 0 12px;font-size:13.5px;line-height:1.55;color:${th.text};">Vælg det målepunkt du vil bruge.</p>${items}`;
  }
  return card(indicator+body);
}

function sheetHTML(){
  const th=THEMES[app.state.theme];
  const card=(key,name,desc,swatches)=>{const sel=app.state.theme===key;
    const sw=swatches.map(c=>`<span style="width:14px;height:22px;border-radius:5px;background:${c};"></span>`).join('');
    return `<button onclick="setTheme('${key}')" style="display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:13px 14px;border-radius:16px;border:2px solid ${sel?th.accent:th.border};background:${sel?th.accentSoft:th.surface};color:${th.text};font:inherit;cursor:pointer;transition:all .15s;">
      <span style="display:flex;gap:4px;">${sw}</span>
      <span style="flex:1;"><span style="display:block;font-weight:800;font-size:15px;">${name}</span><span style="display:block;font-size:12px;color:${th.muted};">${desc}</span></span>
      ${sel?`<span style="font-size:15px;color:${th.accent};">✓</span>`:''}</button>`;};
  const pill=(reg,label)=>{const a=app.state.region===reg;
    return `<button onclick="setRegion('${reg}')" style="flex:1;padding:12px 0;border-radius:14px;border:2px solid ${a?th.accent:th.border};background:${a?th.accentSoft:th.surface};color:${th.text};font:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s;">${label}</button>`;};
  const step=(fn,sym)=>`<button onclick="${fn}" style="width:36px;height:36px;flex-shrink:0;border-radius:11px;border:1px solid ${th.border};background:${th.surface};color:${th.text};font:inherit;font-size:19px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;">${sym}</button>`;
  const apRow=(emoji,name,key,val)=>`<div style="display:flex;align-items:center;gap:12px;background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:11px 14px;">
      <span style="font-size:20px;">${emoji}</span><span style="flex:1;font-weight:700;font-size:14px;">${name}</span>
      ${step(`adjAp('${key}',-1)`,'−')}<span style="min-width:38px;text-align:center;font-weight:800;font-size:15px;">${val}</span>${step(`adjAp('${key}',1)`,'+')}</div>`;
  const lbl=t=>`<div style="font-size:12px;font-weight:800;letter-spacing:.1em;color:${th.muted};margin-bottom:10px;">${t}</div>`;
  const sh=document.getElementById('sheet'); sh.style.background=th.sheetBg; sh.style.color=th.text;
  return `
    <div style="width:40px;height:5px;border-radius:99px;background:${th.border};margin:6px auto 16px;"></div>
    <div style="display:flex;align-items:center;margin-bottom:18px;"><span style="font-weight:800;font-size:20px;">Indstillinger</span>
      <button onclick="closeSettings()" style="margin-left:auto;width:32px;height:32px;border-radius:50%;border:none;background:${th.surface};color:${th.text};font-size:15px;cursor:pointer;">✕</button></div>
    ${lbl('TEMA')}
    <div style="display:flex;flex-direction:column;gap:9px;margin-bottom:24px;">
      ${card('soft','Blød &amp; venlig','Roligt, rundt, lyst',['#34B27B','#11352b','#FFD23F'])}
      ${card('bold','Bold &amp; elektrisk','Stor type, mørkt, neon',['#0C1117','#C6FF3D','#FF5C7A'])}
      ${card('play','Legende &amp; gamificeret','Spil, score, badges',['#6C4BD8','#2BC48A','#FFB020'])}
    </div>
    ${lbl('PRISOMRÅDE')}
    <div style="display:flex;gap:9px;margin-bottom:24px;">${pill('DK1','DK1 · Vest')}${pill('DK2','DK2 · Øst')}</div>
    ${lbl('NETSELSKAB')}
    <div style="display:flex;flex-wrap:wrap;gap:9px;margin-bottom:${app.state.dso==='custom'?'14px':'24px'};">
      ${Object.entries(DSO_TARIFFS).map(([key,d])=>{
        const a=app.state.dso===key;
        return `<button onclick="setDso('${key}')" style="flex:1 1 30%;padding:11px 0;border-radius:14px;border:2px solid ${a?th.accent:th.border};background:${a?th.accentSoft:th.surface};color:${th.text};font:inherit;font-weight:700;font-size:13px;cursor:pointer;">${d.navn}</button>`;
      }).join('')}
      ${(()=>{const a=app.state.dso==='custom';
        return `<button onclick="setDso('custom')" style="flex:1 1 30%;padding:11px 0;border-radius:14px;border:2px solid ${a?th.accent:th.border};background:${a?th.accentSoft:th.surface};color:${th.text};font:inherit;font-weight:700;font-size:13px;cursor:pointer;">Andet</button>`;})()}
    </div>
    ${app.state.dso==='custom' ? customTariffHTML(th) : ''}
    ${lbl('ELHANDLER-TILLÆG')}
    <div style="display:flex;align-items:center;gap:12px;background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:12px 14px;margin-bottom:24px;">
      <div style="flex:1;"><div style="font-weight:700;font-size:14px;">Tillæg pr. kWh</div><div style="font-size:12px;color:${th.muted};">Inkl. moms</div></div>
      ${step('adjMarkup(-1)','−')}<span style="min-width:78px;text-align:center;font-weight:800;font-size:15px;">${app.state.markup} øre</span>${step('adjMarkup(1)','+')}</div>
    ${lbl('APPARATER — VARIGHED I TIMER')}
    <div style="display:flex;flex-direction:column;gap:9px;">
      ${apRow('🚗','Bil — ladning','bilH',app.state.bilH)}
      ${apRow('🍽️','Opvask','opvaskH',app.state.opvaskH)}
      ${apRow('👕','Vasketøj','vaskH',app.state.vaskH)}
    </div>
    ${lbl('FORBRUGSDATA (ELOVERBLIK)')}
    ${app.state.eloverblik.refreshToken && app.state.eloverblik.meteringPointId
      ? `<div style="display:flex;align-items:center;gap:12px;background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:12px 14px;margin-bottom:24px;">
           <span style="font-size:20px;">🔌</span>
           <div style="flex:1;"><div style="font-weight:700;font-size:14px;">Forbundet</div><div style="font-size:12px;color:${th.muted};">${app.state.eloverblik.meteringPointId ? 'Målepunkt valgt' : 'Intet målepunkt'}</div></div>
           <button onclick="disconnectEloverblik()" style="border:1px solid ${th.border};background:transparent;color:${th.text};font:inherit;font-size:12px;font-weight:700;border-radius:10px;padding:7px 12px;cursor:pointer;">Afbryd</button>
         </div>`
      : `<div style="margin-bottom:24px;">${wizardHTML(th)}</div>`}
    <button onclick="closeSettings()" style="width:100%;margin-top:22px;padding:14px;border:none;border-radius:16px;background:${th.accent};color:${th.accentText};font:inherit;font-weight:800;font-size:15px;cursor:pointer;">Gem &amp; luk</button>`;
}

/* ===================== RENDER ===================== */
function render(){
  const th=THEMES[app.state.theme];
  document.body.style.background=th.bg;
  document.getElementById('theme-color').setAttribute('content',th.bg);
  const root=document.getElementById('app');
  if(app.loading){root.innerHTML=`<div class="skel">${voltSVG('charge',72,th.text)}<div style="margin-top:14px;">Henter elpriser…</div></div>`;return;}
  if(app.error){
    root.innerHTML=`<div style="padding:40px 6px;text-align:center;color:${th.text};">
      <div style="font-size:40px;margin-bottom:10px;">⚡</div>
      <p style="color:${th.muted};line-height:1.6;">Kunne ikke hente priser (${app.error}).<br>Tjek forbindelsen.</p>
      <button onclick="load()" style="margin-top:14px;padding:12px 22px;border:none;border-radius:14px;background:${th.accent};color:${th.accentText};font:inherit;font-weight:800;cursor:pointer;">Prøv igen</button></div>`;
  } else {
    const V=computeView();
    app.lastV=V;
    root.innerHTML = app.state.theme==='bold'?viewBold(V):(app.state.theme==='play'?viewPlay(V):viewSoft(V));
  }
  const sr=document.getElementById('sheet-root');
  if(app.state.settingsOpen){ document.getElementById('sheet').innerHTML=sheetHTML(); sr.classList.add('open'); }
  else sr.classList.remove('open');
}

/* ===================== ACTIONS (global) ===================== */
function openSettings(){app.state.settingsOpen=true;render();}
function closeSettings(){app.state.settingsOpen=false;render();}
function setTheme(t){app.state.theme=t;saveState();render();}
function setRegion(r){app.state.region=r;saveState();load();}
function setDso(key){ app.state.dso=key; saveState(); render(); }
function adjCustom(seasonKey,band,d){
  const v=app.state.customTariff[seasonKey][band];
  app.state.customTariff[seasonKey][band]=Math.max(0,Math.min(400,v+d));
  saveState(); render();
}
function wizardNext(){ app.state.wizardStep=Math.min(3, app.state.wizardStep+1); app.state.wizardMsg=''; render(); }
async function testEloverblik(){
  const ta=document.getElementById('ev-token');
  const token=(ta && ta.value || '').trim();
  if(!token){ app.state.wizardMsg='Fejl: indsæt din nøgle først.'; render(); return; }
  app.state.wizardMsg='Tester forbindelse…'; render();
  try{
    const access=await getAccessToken(token);
    const mps=await getMeteringPoints(access);
    app.state.eloverblik.refreshToken=token;       // tentatively store; finalized on pick
    app.state.eloverblik.accessToken=access;
    app.state.eloverblik.accessTokenExp=Date.now()+23*3600*1000;
    app.state.meteringPoints=mps;
    app.state.wizardMsg='';
    app.state.wizardStep=3;
    if(mps.length===1){ pickMeteringPoint(mps[0].id); return; }
    render();
  }catch(e){
    app.state.eloverblik.refreshToken='';
    app.state.wizardMsg='Fejl: nøglen virker ikke — tjek at du fik hele teksten med.';
    render();
  }
}
function pickMeteringPoint(id){
  app.state.eloverblik.meteringPointId=id;
  saveState();
  app.state.wizardStep=0; app.state.wizardMsg='';
  render();
}
function disconnectEloverblik(){
  app.state.eloverblik={ refreshToken:'', meteringPointId:'', accessToken:'', accessTokenExp:0 };
  app.state.meteringPoints=[]; app.state.wizardStep=0; app.state.wizardMsg='';
  saveState(); render();
}
function setChartTab(t){app.state.chartTab=t;app.state.selectedHour=null;render();}
function selectHour(h){ app.state.selectedHour = (h===null || h===app.state.selectedHour) ? null : h; render(); }
function adjMarkup(d){app.state.markup=Math.max(0,Math.min(60,app.state.markup+d));saveState();render();}
function adjAp(key,d){const lim={bilH:[1,12],opvaskH:[1,6],vaskH:[1,6]}[key];
  app.state[key]=Math.max(lim[0],Math.min(lim[1],app.state[key]+d));saveState();render();}
function doRefresh(btn){if(btn){btn.classList.add('spin');setTimeout(()=>btn.classList.remove('spin'),700);}load();}
function logClaim(apparat){
  const V=app.lastV; if(!V) return;
  const now=new Date();
  const varighed={bil:app.state.bilH,opvask:app.state.opvaskH,vask:app.state.vaskH}[apparat]||1;
  const id=`${keyOf(now)}-${apparat}-${now.getHours()}`;
  const prices=Array(24).fill(0); V.todayList.forEach(x=>{ if(x.h>=0&&x.h<24) prices[x.h]=x.total; });
  const claim={ id, apparat, dato:keyOf(now), startHour:now.getHours(), varighed, tierVedStart:V.nowTier, prices, status:'pending', point:0 };
  const claims=loadClaims().filter(c=>c.id!==id);
  claims.push(claim); saveClaims(claims);
  render();
}
window.logClaim=logClaim;
window.openSettings=openSettings;window.closeSettings=closeSettings;window.setTheme=setTheme;
window.setRegion=setRegion;window.setChartTab=setChartTab;window.adjMarkup=adjMarkup;window.adjAp=adjAp;
window.setDso=setDso;window.adjCustom=adjCustom;
window.selectHour=selectHour;
window.wizardNext=wizardNext; window.testEloverblik=testEloverblik;
window.pickMeteringPoint=pickMeteringPoint; window.disconnectEloverblik=disconnectEloverblik;
window.doRefresh=doRefresh;window.load=load;

/* ===================== INIT ===================== */
loadState();
render();
load();
document.addEventListener('visibilitychange',()=>{if(!document.hidden)load();});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
