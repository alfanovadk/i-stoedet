<title>I stødet</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:'Figtree',-apple-system,BlinkMacSystemFont,sans-serif;color:#11352b;
    background:#F3FAF6;transition:background .25s;min-height:100dvh;
    -webkit-font-smoothing:antialiased}
  #app{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative}
  /* indholds-område: scroll-frit pr. fane; padding-bottom = fanelinje + safe-area */
  .tabcontent{flex:1;min-height:0;padding:calc(env(safe-area-inset-top) + 8px) 20px calc(64px + env(safe-area-inset-bottom) + 8px);}
  /* fast bund-fanelinje */
  .tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:430px;z-index:40;
    display:flex;padding:6px 8px calc(env(safe-area-inset-bottom));
    border-top:1px solid var(--tb-border);background:var(--tb-bg);backdrop-filter:saturate(1.2) blur(8px);}
  .tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 0 5px;border:none;background:transparent;
    font:inherit;font-weight:700;font-size:10.5px;cursor:pointer;border-radius:13px;transition:color .15s,background .15s;}
  .tabbtn .ic{font-size:20px;line-height:1;}
  button{font-family:inherit}
  @keyframes slideup{0%{transform:translateY(100%)}100%{transform:translateY(0)}}
  @keyframes fadein{0%{opacity:0}100%{opacity:1}}
  @keyframes pop{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
  .pane{animation:pop .22s ease}
  .spin{animation:spin .7s linear}
  @keyframes spin{to{transform:rotate(360deg)}}
  .bar{transition:height .45s cubic-bezier(.2,.8,.2,1)}
  .skel{padding:60px 0;text-align:center;color:#7c8a83;font-weight:600}
  #sheet-root{position:fixed;inset:0;z-index:60;display:none}
  #sheet-root.open{display:block}
  .sheet-back{position:absolute;inset:0;background:rgba(8,12,18,.5);animation:fadein .2s ease}
  .sheet{position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:430px;
    max-height:92%;overflow-y:auto;border-radius:28px 28px 0 0;padding:10px 20px calc(env(safe-area-inset-bottom) + 28px);
    animation:slideup .28s cubic-bezier(.2,.9,.2,1)}

  /* ===== ELLY MASCOT — base + statisk tilstand (altid, også reduced-motion) ===== */
  .char{transform-box:fill-box;transform-origin:center}
  .bolt{transform-box:fill-box;transform-origin:center}
  .eye,.pupil{transform-box:fill-box;transform-origin:center}
  .brow,.mouth-mad,.spark,.sparkle{opacity:0}
  /* statisk pris-tier-udtryk (farve/ansigt) — IKKE animation, så tier er synlig uden bevægelse */
  .cheap .bolt{fill:#34B27B}
  .expensive .eye{transform:scaleY(.5)}
  .expensive .mouth-happy{opacity:0}
  .expensive .mouth-mad{opacity:1}
  .expensive .brow{opacity:1}

  /* ===== ELLY MASCOT — bevægelse (kun når brugeren tillader animation) ===== */
  @media (prefers-reduced-motion: no-preference){
    @keyframes blink{0%,46%,54%,100%{transform:scaleY(1)}50%{transform:scaleY(.12)}}
    @keyframes pupilHide{0%,46%,54%,100%{opacity:1}50%{opacity:0}}
    .blink .eye{animation:blink 4s ease-in-out infinite}
    .blink .pupil{animation:pupilHide 4s ease-in-out infinite}

    @keyframes float{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-7px) rotate(4deg)}}
    .idle .char,.mid .char{animation:float 3s ease-in-out infinite}
    .idle .eye,.mid .eye{animation:blink 4s ease-in-out infinite}
    .idle .pupil,.mid .pupil{animation:pupilHide 4s ease-in-out infinite}

    @keyframes hop{
      0%,100%{transform:translateY(0) scale(1,1)}
      15%{transform:translateY(0) scale(1.12,.85)}
      40%{transform:translateY(-24px) scale(.9,1.15)}
      70%{transform:translateY(0) scale(1.1,.9)}
      85%{transform:translateY(0) scale(.98,1.02)}}
    @keyframes glowGreen{0%,100%{filter:drop-shadow(0 0 2px rgba(52,178,123,.4))}
      50%{filter:drop-shadow(0 0 12px rgba(52,178,123,.85))}}
    @keyframes sparklePop{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:1;transform:scale(1.1)}}
    @keyframes cheapDance{
      0%{transform:translateY(0) scale(1,1) rotate(0)}
      7%{transform:translateY(0) scale(1.12,.85) rotate(0)}
      20%{transform:translateY(-24px) scale(.9,1.15) rotate(0)}
      33%{transform:translateY(0) scale(1.1,.9) rotate(0)}
      44%{transform:translateY(0) scale(1) rotate(0)}
      52%{transform:translateY(0) scale(1) rotate(0)}
      60%{transform:translateY(0) scale(1.05) rotate(-20deg)}
      90%{transform:translateY(0) scale(1.05) rotate(380deg)}
      100%{transform:translateY(0) scale(1) rotate(360deg)}}
    .cheap{animation:glowGreen 1s ease-in-out infinite}
    .cheap .char{animation:cheapDance 2.8s ease-in-out infinite;transform-origin:center}
    .cheap .eye{animation:blink 3.4s ease-in-out infinite}
    .cheap .pupil{animation:pupilHide 3.4s ease-in-out infinite}
    .cheap .sparkle{transform-box:fill-box;transform-origin:center;animation:sparklePop 1s ease-in-out infinite}
    .cheap .sparkle:nth-of-type(2){animation-delay:.33s}
    .cheap .sparkle:nth-of-type(3){animation-delay:.66s}

    @keyframes buzz{0%,100%{transform:translate(0,0) rotate(0)}
      20%{transform:translate(-1.8px,1px) rotate(-3deg)}
      40%{transform:translate(1.8px,-1px) rotate(3deg)}
      60%{transform:translate(-1.2px,-1px) rotate(-2deg)}
      80%{transform:translate(1.2px,1px) rotate(2deg)}}
    @keyframes zapRed{0%,100%{fill:#E5604D}40%{fill:#FF2F52}70%{fill:#ffc2cc}}
    @keyframes glowRed{0%,100%{filter:drop-shadow(0 0 2px rgba(229,96,77,.5))}
      50%{filter:drop-shadow(0 0 14px rgba(255,47,82,.95))}}
    @keyframes crackle{0%,100%{opacity:0}45%{opacity:0}50%{opacity:1}55%{opacity:0}}
    .expensive{animation:glowRed .3s ease-in-out infinite}
    .expensive .char{animation:buzz .17s linear infinite}
    .expensive .bolt{animation:zapRed .35s steps(1) infinite}

    @keyframes charge{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
    @keyframes glowY{0%,100%{filter:drop-shadow(0 0 0 rgba(255,210,63,0))}50%{filter:drop-shadow(0 0 10px rgba(255,210,63,.95))}}
    .charge{animation:glowY .6s ease-in-out infinite}
    .charge .char{animation:charge .6s ease-in-out infinite}

    @keyframes cheer{0%{transform:rotate(0) scale(1)}35%{transform:rotate(-18deg) scale(1.05)}70%{transform:rotate(380deg) scale(1.05)}100%{transform:rotate(360deg) scale(1)}}
    .cheer .char{animation:cheer 1.1s cubic-bezier(.4,1.4,.5,1) infinite}

    /* FA «beat» — tændt pære pulserer som om den lyser */
    @keyframes fa-beat{0%,90%{transform:scale(1)}45%{transform:scale(1.2)}}
    .fa-beat{animation:fa-beat 1s ease-in-out infinite;transform-origin:center}
  }

/* ===================== STALE-GUARD (tålmodig baggrunds-hentning) ===================== */
// DataHub er ofte transient nede og data er kun 1-2 dage forsinket — derfor poller vi sjældent.
// UI'et render ALTID fra cachen; en frisk hentning sker kun hvis cachen mangler eller er ældre
// end STALE-vinduet. Sat generøst (6t) så vi ikke spammer DataHub.
const STALE_MS = 6*3600*1000;
function lastConsumptionFetch(){ try{ return +localStorage.getItem('elpriser_consumption_fetched')||0; }catch(e){ return 0; } }
function markConsumptionFetched(){ try{ localStorage.setItem('elpriser_consumption_fetched', String(Date.now())); }catch(e){} }
// Skal vi hente i baggrunden? Ja hvis cache mangler det vi har brug for, ELLER sidste succesfulde
// hentning er ældre end STALE-vinduet. force=true (manuel «Prøv igen»/opdatér) overstyrer vinduet.
function shouldRefreshConsumption(force, cacheMissing){
  if(force) return true;
  if(cacheMissing) return true;
  return (Date.now() - lastConsumptionFetch()) > STALE_MS;
}
function dateFromKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function isoDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function prevDayKey(k){ return keyOf(addDays(dateFromKey(k),-1)); }

async function refreshConsumption(){
  const ev=app.state.eloverblik;
  if(!ev.refreshToken || !ev.meteringPointId) return;
  const claims=loadClaims();
  const today=keyOf(new Date());
  // only fetch for pending claims whose day is in the past (data ~1-2 days delayed)
  const pending=claims.filter(c=>c.status==='pending' && c.dato!==today);
  if(!pending.length) return;
  const cons=loadConsumption();
  const needed=[...new Set(pending.map(c=>c.dato).filter(d=>!cons[d]))];
  if(!needed.length) return;
  // Stale-guard: selv med manglende claim-data venter vi STALE-vinduet mellem forsøg, så en
  // vedvarende DataHub-nedetid ikke trigger en hentning på hvert load/visibilitychange.
  if(!shouldRefreshConsumption(false, false)) return;
  try{
    let access=ev.accessToken;
    if(!access || Date.now()>ev.accessTokenExp){
      access=await getAccessToken(ev.refreshToken);
      ev.accessToken=access; ev.accessTokenExp=Date.now()+23*3600*1000; saveState();
    }
    const dates=needed.map(dateFromKey).sort((a,b)=>a-b);
    const from=isoDate(dates[0]); const to=isoDate(addDays(dates[dates.length-1],1));
    const json=await getTimeSeries(access, ev.meteringPointId, from, to);
    Object.assign(cons, parseTimeSeries(json));
    saveConsumption(cons);
    markConsumptionFetched();
  }catch(e){ /* non-blocking: behold pending, prøv igen efter STALE-vinduet */ }
}

async function fetchRecentConsumption(force){
  const ev=app.state.eloverblik;
  if(!ev.refreshToken || !ev.meteringPointId) return;
  // Stale-guard: spring over hvis vi har frisk data og senest hentede inden for STALE-vinduet.
  // "needed" = de seneste par dage hvor vi mangler times-data i cachen.
  const cons0=loadConsumption();
  const need=[];
  for(let i=1;i<=5;i++){ const dk=keyOf(addDays(new Date(),-i)); if(!cons0[dk]) need.push(dk); }
  if(!shouldRefreshConsumption(force, need.length>0)) return;
  try{
    let access=ev.accessToken;
    if(!access || Date.now()>ev.accessTokenExp){
      access=await getAccessToken(ev.refreshToken);
      ev.accessToken=access; ev.accessTokenExp=Date.now()+23*3600*1000; saveState();
    }
    const today=new Date();
    const from=isoDate(addDays(today,-5)), to=isoDate(addDays(today,1));
    const json=await getTimeSeries(access, ev.meteringPointId, from, to);
    const parsed=parseTimeSeries(json);
    // Merge ind i cachen (overskriv ALDRIG hele objektet destruktivt) — cache er permanent.
    const cons=loadConsumption(); Object.assign(cons,parsed); saveConsumption(cons);
    markConsumptionFetched();
    // fetch matching day prices (only days we now have consumption for and lack prices)
    const dp=loadDayPrices();
    for(const dk of Object.keys(parsed)){
      if(dp[dk]) continue;
      try{
        const recs=await fetchDay(dateFromKey(dk));
        const list=seriesForDay(recs, dk, cfg());
        if(list.length){ const arr=Array(24).fill(0); list.forEach(x=>{arr[x.h]=x.total;}); dp[dk]=arr; }
      }catch(e){}
    }
    saveDayPrices(dp);
    render();
  }catch(e){ /* non-blocking: behold cache, prøv igen efter STALE-vinduet (ingen tæt loop) */ }
}

/* ===================== FORBRUGS-ANALYSE ===================== */
const MONTHS_DK=['januar','februar','marts','april','maj','juni','juli','august','september','oktober','november','december'];
function startOfDay(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
function addMonths(d,n){ return new Date(d.getFullYear(),d.getMonth()+n,1); }
function monthKey(d){ return `${d.getFullYear()}-${d.getMonth()+1}`; }
function dataLatest(){ const d=new Date(); d.setDate(d.getDate()-1); return startOfDay(d); } // Eloverblik ~1-2 dage forsinket

// Beregn [from,to]-interval (Date, til er eksklusiv-grænse-dag inkl.) for en periodetype + offset.
function periodRange(type, fromKey, toKey){
  const today=dataLatest();
  if(type==='custom' && fromKey && toKey){
    return { from:dateFromKey(fromKey), to:dateFromKey(toKey) };
  }
  // fromKey bruges som anker (start på den valgte periode) ved navigation
  if(type==='dag'){ const a=fromKey?dateFromKey(fromKey):today; return { from:a, to:a }; }
  if(type==='uge'){
    const a=fromKey?dateFromKey(fromKey):today;
    const mon=new Date(a); const dow=(mon.getDay()+6)%7; mon.setDate(mon.getDate()-dow); // mandag
    const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    return { from:startOfDay(mon), to:startOfDay(sun) };
  }
  if(type==='maaned'){
    const a=fromKey?dateFromKey(fromKey):today;
    const f=new Date(a.getFullYear(),a.getMonth(),1);
    const t=new Date(a.getFullYear(),a.getMonth()+1,0);
    return { from:f, to:t };
  }
  if(type==='kvartal'){
    const a=fromKey?dateFromKey(fromKey):today;
    const q=Math.floor(a.getMonth()/3);
    const f=new Date(a.getFullYear(),q*3,1);
    const t=new Date(a.getFullYear(),q*3+3,0);
    return { from:f, to:t };
  }
  if(type==='aar'){
    const a=fromKey?dateFromKey(fromKey):today;
    return { from:new Date(a.getFullYear(),0,1), to:new Date(a.getFullYear(),11,31) };
  }
  return { from:today, to:today };
}
// Vælg aggregering efter periodelængde: dag→Hour, uge/måned→Day, kvartal/år→Month.
function aggForType(type){
  if(type==='dag') return 'Hour';
  if(type==='uge'||type==='maaned'||type==='custom') return 'Day';
  return 'Month';
}
function rangeLabel(type, range){
  const f=range.from, t=range.to;
  if(type==='dag') return f.toLocaleDateString('da-DK',{weekday:'long',day:'numeric',month:'long'});
  if(type==='maaned') return `${MONTHS_DK[f.getMonth()]} ${f.getFullYear()}`;
  if(type==='aar') return String(f.getFullYear());
  if(type==='kvartal') return `K${Math.floor(f.getMonth()/3)+1} ${f.getFullYear()}`;
  const fmt=d=>d.toLocaleDateString('da-DK',{day:'numeric',month:'short'});
  return `${fmt(f)} – ${fmt(t)}`;
}

// Hent forbrug for et interval i den givne aggregering. Returnerer cache-objektet (mutér ikke kalderen).
async function ensureAccess(){
  const ev=app.state.eloverblik;
  let access=ev.accessToken;
  if(!access || Date.now()>ev.accessTokenExp){
    access=await getAccessToken(ev.refreshToken);
    ev.accessToken=access; ev.accessTokenExp=Date.now()+23*3600*1000; saveState();
  }
  return access;
}

// Henter data for et interval i nødvendig opløsning. Cacher i passende store. Returnerer evt. fejl-tekst.
async function fetchRange(range, agg){
  const ev=app.state.eloverblik;
  if(!ev.refreshToken || !ev.meteringPointId) return 'Forbind Eloverblik først.';
  // Eloverblik afviser (400) forespørgsler hvis til-datoen rækker ind i fremtiden.
  // Cap til eksklusiv slutning til i morgen; spring helt over hvis perioden er fremtidig.
  const tomorrow=addDays(new Date(),1);
  if(range.from > tomorrow) return null; // perioden er i fremtiden — ingen data endnu
  let toDate=addDays(range.to,1); if(toDate>tomorrow) toDate=tomorrow;
  const from=isoDate(range.from), to=isoDate(toDate); // til eksklusiv
  try{
    const access=await ensureAccess();
    const json=await getTimeSeries(access, ev.meteringPointId, from, to, agg);
    if(agg==='Hour'){
      const parsed=parseTimeSeries(json);
      const cons=loadConsumption(); Object.assign(cons,parsed); saveConsumption(cons);
    } else if(agg==='Day'){
      const parsed=parseBuckets(json,'Day');
      const dc=loadDailyConsumption(); Object.assign(dc,parsed); saveDailyConsumption(dc);
    } else {
      const parsed=parseBuckets(json,'Month');
      const mc=loadMonthlyConsumption(); Object.assign(mc,parsed); saveMonthlyConsumption(mc);
    }
    markConsumptionFetched();
    return null;
  }catch(e){
    // Transiente DataHub/timeout-fejl skelnes fra øvrige (auth/netværk) så UX kan være tålmodig.
    if(e.message==='eloverblik:datahub' || e.message==='eloverblik:timeout') return 'eloverblik:transient';
    return 'Kunne ikke hente forbrug ('+e.message+'). Prøv igen.';
  }
}

// Har cachen ALLE buckets for en periode? (bruges til at gate baggrunds-hentning.)
function hasCachedPeriod(type, range){
  const { rows }=bucketsForPeriod(type, range);
  return rows.length>0 && rows.every(r=>r.kwh!=null);
}

// Indlæs data for den valgte periode + samme periode sidste år (år-over-år). Non-blocking.
// force=true (manuel «Prøv igen») overstyrer stale-guard'en.
async function loadAnalyseData(force){
  const ev=app.state.eloverblik;
  if(!ev.refreshToken || !ev.meteringPointId) return;
  const a=app.state.analyse;
  const range=periodRange(a.periodeType, a.fromKey, a.toKey);
  const agg=aggForType(a.periodeType);
  // Cache-first: render altid fra cachen. Hent kun friskt hvis cachen mangler periodens data
  // ELLER stale-vinduet er overskredet ELLER brugeren forcerer. Aldrig tæt auto-retry.
  const cacheMissing=!hasCachedPeriod(a.periodeType, range);
  // CO₂-intensitet for perioden (EDS) — egen per-dag-cache-miss-gate, no-op når alt er cachet.
  loadCO2ForPeriod(range);
  if(!shouldRefreshConsumption(force, cacheMissing)){
    app.state.analyseMsg=null;
    if(agg==='Hour') await ensureDayPrice(isoDate(range.from));
    render();
    return;
  }
  // Vis kun en blokkerende loader når cachen er TOM for perioden; ellers render vi cache + henter stille.
  app.state.analyseLoading=cacheMissing; app.state.analyseMsg=null; render();
  // sidste år (samme interval, et år tilbage)
  const lastYear={ from:new Date(range.from.getFullYear()-1,range.from.getMonth(),range.from.getDate()),
                   to:new Date(range.to.getFullYear()-1,range.to.getMonth(),range.to.getDate()) };
  const e1=await fetchRange(range, agg);
  const e2=await fetchRange(lastYear, agg);   // YoY — fejler stille hvis ingen historik
  app.state.analyseLoading=false;
  // Fejl er ikke-blokkerende: forbrugView render fra cache. Vis en diskret, tålmodig note.
  app.state.analyseMsg = e1==='eloverblik:transient'
      ? 'Eloverbliks system svarer langsomt lige nu — viser dine seneste hentede tal. Prøver igen senere.'
      : (e1 ? 'Kunne ikke opdatere — tjek din Eloverblik-forbindelse.' : null);
  // hent dag-priser til tier-farvning når perioden er en enkelt dag (Hour)
  if(agg==='Hour' && !e1){ await ensureDayPrice(isoDate(range.from)); }
  render();
}

// CO₂-cache-nøgle: prisområde-prefix så DK1/DK2 ikke blandes. `${region}|${dayKey}`.
function co2Key(region, dayKey){ return `${region}|${dayKey}`; }
// CO₂-intensitet for én dag fra cache → number[24] eller null. Bundet til prisområde.
function cachedCO2Day(region, dayKey){ const c=loadCO2(); return c[co2Key(region, dayKey)]||null; }
// Dag-snit-CO₂ (g/kWh) for én dag fra cache → number eller null. Bundet til prisområde.
// Falder tilbage til at udlede snittet fra det cachede time-array hvis dag-snittet mangler.
function cachedCO2DailyAvg(region, dayKey){
  const d=loadCO2Daily(); const v=d[co2Key(region, dayKey)];
  if(v!=null) return v;
  const hours=cachedCO2Day(region, dayKey);
  if(!hours) return null;
  const list=hours.filter(x=>+x>0);
  return list.length ? list.reduce((a,b)=>a+(+b||0),0)/list.length : 0;
}

// Hent CO₂-intensitet for de dage i [from,to] vi mangler i cachen. Kun fortid/i dag (EDS
// har ikke fremtid). Non-blocking: behold cache ved fejl. Polite: kun manglende dage hentes.
async function loadCO2ForPeriod(range){
  const region=app.state.region;
  const cache=loadCO2();
  // Saml manglende dag-nøgler i intervallet (afgrænset til ikke-fremtid + maks i dag).
  const today=startOfDay(new Date());
  const need=[];
  for(let d=startOfDay(new Date(range.from)); d<=range.to && d<=today; d=addDays(d,1)){
    const dk=keyOf(d);
    if(!cache[co2Key(region, dk)]) need.push(new Date(d));
  }
  if(!need.length) return;
  // Ét samlet kald over hele det manglende span (EDS er hurtig — men vær alligevel sparsom).
  const span0=need[0], span1=need[need.length-1];
  const fromISO=isoDate(span0), toISO=isoDate(addDays(span1,1)); // end er eksklusiv
  try{
    const parsed=await fetchCO2(region, fromISO, toISO);   // { dayKey: number[24] }
    const c=loadCO2();
    for(const dk of Object.keys(parsed)){ c[co2Key(region, dk)]=parsed[dk]; }
    saveCO2(c);
    // Cache også dag-snit (g/kWh) til dag-niveau-approksimationen (Måned/Kvartal/År).
    const daily=loadCO2Daily(), avgByDay=dailyAvgCO2(parsed);
    for(const dk of Object.keys(avgByDay)){ daily[co2Key(region, dk)]=avgByDay[dk]; }
    saveCO2Daily(daily);
    render();
  }catch(e){ /* non-blocking: behold cache, EDS-fejl er sjælden og transient */ }
}

async function ensureDayPrice(dayKey){
  const dp=loadDayPrices();
  if(dp[dayKey]) return;
  try{
    const recs=await fetchDay(dateFromKey(dayKey));
    const list=seriesForDay(recs, dayKey, cfg());
    if(list.length){ const arr=Array(24).fill(0); list.forEach(x=>{arr[x.h]=x.total;}); dp[dayKey]=arr; saveDayPrices(dp); }
  }catch(e){}
}

// Saml de relevante buckets for en periode fra cache → {key: kWh} i kronologisk orden.
function bucketsForPeriod(type, range){
  const agg=aggForType(type);
  const out=[];
  if(agg==='Hour'){
    const cons=loadConsumption();
    const dk=keyOf(range.from);
    const arr=cons[dk]||null;
    if(arr){ for(let h=0;h<24;h++) out.push({ key:pad(h), kwh:arr[h]||0, hour:h }); }
    return { rows:out, agg, hourArr:arr };
  }
  if(agg==='Day'){
    const dc=loadDailyConsumption();
    for(let d=new Date(range.from); d<=range.to; d=addDays(d,1)){
      const dk=keyOf(d);
      out.push({ key:dk, kwh:dc[dk]!=null?dc[dk]:null, date:new Date(d) });
    }
    return { rows:out, agg };
  }
  // Month
  const mc=loadMonthlyConsumption();
  for(let m=new Date(range.from.getFullYear(),range.from.getMonth(),1); m<=range.to; m=addMonths(m,1)){
    const mk=monthKey(m);
    out.push({ key:mk, kwh:mc[mk]!=null?mc[mk]:null, date:new Date(m) });
  }
  return { rows:out, agg };
}

function verifyPending(){
  const claims=loadClaims();
  const cons=loadConsumption();
  const g=loadGamify();
  let changed=false;
  const badgesBefore=JSON.stringify(g.badges||{});
  for(const c of claims){
    if(c.status!=='pending') continue;
    const kwh=cons[c.dato];
    if(!kwh) continue;
    const prices=c.prices||Array(24).fill(0);
    const status=verifyClaim(c, kwh, prices);
    if(status==='pending') continue;
    c.status=status; changed=true;
    if(status==='confirmed'){
      c.point=pointsFor(c, prices);
      g.totalPoint=(g.totalPoint||0)+c.point;
      // streak: consecutive days with >=1 confirmed
      if(g.lastConfirmedDate!==c.dato){
        g.streak = (g.lastConfirmedDate===prevDayKey(c.dato)) ? (g.streak||0)+1 : 1;
        g.lastConfirmedDate=c.dato;
      }
    }
  }
  if(changed){
    g.badges=badgeUpdates(g, claims);
    saveClaims(claims); saveGamify(g);
    if(JSON.stringify(g.badges)!==badgesBefore){
      // a badge flipped — celebrate
      app.cheerUntil=Date.now()+4000;
      setTimeout(()=>{ render(); }, 4100);
    }
    render();
  }
}

function computeView(){
  const now=new Date(), nowH=now.getHours();
  const todayList=seriesForDay(app.raw, keyOf(now), cfg());
  const tmr=new Date(); tmr.setDate(tmr.getDate()+1);
  const tmrList=seriesForDay(app.raw, keyOf(tmr), cfg());
  const hasToday=todayList.length>0, hasTmr=tmrList.length>0;
  const todayVals=todayList.map(x=>x.total);
  const [loT,hiT]=hasToday?loHi(todayVals):[0,1];

  const byHour=h=>todayList.find(x=>x.h===h);
  const nowEntry=byHour(nowH);
  const nowTotal=nowEntry?nowEntry.total:(todayVals[0]??0);
  const nowTier=tierOf(nowTotal,loT,hiT);
  const peak=hasToday?Math.max(...todayVals):0;

  let ce=nowH; while(ce<24 && byHour(ce) && tierOf(byHour(ce).total,loT,hiT)===0) ce++;
  const cheapEnd=pad(Math.min(ce,24))+':00';
  let nc=-1; for(let h=nowH;h<24;h++){const e=byHour(h); if(e && tierOf(e.total,loT,hiT)===0){nc=h;break;}}
  const nextCheap=nc>=0?pad(nc)+':00':'i morgen';
  const cheapUntil = nowTier===0?cheapEnd:nextCheap;

  const pool=futurePool();
  const dayAvg=todayVals.length?todayVals.reduce((a,b)=>a+b,0)/todayVals.length:0;
  const mkAp=(key,name,verb,len,kwh)=>{const w=bestWindow(pool,len);
    const saveKr=Math.max(0,(dayAvg-(w?w.avg:dayAvg))/100*kwh);
    return {key,name,sub:len+' timers '+verb,win:winStr(w),when:whenText(w),price:kr(w?w.avg:0),save:saveKr.toFixed(0)};};
  const appliances=[
    mkAp('bil','Elbilen','ladning',app.state.bilH,KWH.bil),
    mkAp('opvask','Opvask','program',app.state.opvaskH,KWH.opvask),
    mkAp('vask','Vasketøj','program',app.state.vaskH,KWH.vask)
  ];
  const savedToday=Math.round(appliances.reduce((a,b)=>a+(+b.save),0));
  const score=hasToday?Math.round(Math.max(0,Math.min(100,(peak-nowTotal)/Math.max(1,peak-loT)*100))):0;

  const showToday=app.state.chartTab==='today';
  return {now,nowH,nowTotal,nowTier,peak,cheapUntil,cheapEnd,nextCheap,
    appliances,savedToday,score,streak:STREAK,
    todayList,tmrList,hasToday,hasTmr,
    chartList:showToday?todayList:tmrList,chartNowH:showToday?nowH:-1,
    regionLabel:app.state.region==='DK1'?'DK1 · VEST':'DK2 · ØST',regionShort:app.state.region,
    nowKr:kr(nowTotal),peakKr:kr(peak)};
}

function ringSectors(th){
  const cx=115, cy=115, rOut=115, rIn=64;
  const polar=(r,deg)=>{const a=deg*Math.PI/180; return [cx+r*Math.sin(a), cy-r*Math.cos(a)];};
  let paths='';
  for(let i=0;i<24;i++){
    const a0=i*15, a1=(i+1)*15;
    const [x0o,y0o]=polar(rOut,a0), [x1o,y1o]=polar(rOut,a1);
    const [x1i,y1i]=polar(rIn,a1),  [x0i,y0i]=polar(rIn,a0);
    const sel=i===app.state.selectedHour;
    const d=`M${x0o} ${y0o} A${rOut} ${rOut} 0 0 1 ${x1o} ${y1o} L${x1i} ${y1i} A${rIn} ${rIn} 0 0 0 ${x0i} ${y0i} Z`;
    paths+=`<path d="${d}" fill="${th.ring}" fill-opacity="${sel?0.28:0}" stroke="${sel?th.ring:'none'}" stroke-width="${sel?2:0}" style="cursor:pointer;" onclick="selectHour(${i})"></path>`;
  }
  return `<svg viewBox="0 0 230 230" width="230" height="230" style="position:absolute;left:0;top:0;">${paths}</svg>`;
}

  for(let i=0;i<24;i++){const e=byHour(i);const p=e?e.total:lo;segs.push(pal[tierOf(p,lo,hi)]+' '+(i*15)+'deg '+((i+1)*15)+'deg');}

  return `<p style="margin:-3px 0 10px;font-size:11.5px;line-height:1.45;color:${th.muted};">Tryk «Tænd nu» når du starter et apparat — så tjekker vi dit forbrug og giver point. <button onclick="openPointInfo()" style="background:none;border:none;padding:0;font:inherit;font-size:11.5px;font-weight:700;color:${th.accent};cursor:pointer;text-decoration:underline;">Sådan virker det</button></p>`;
}

function brandFor(th){
  if(app.state.theme==='bold') return `${ellySVG('mid',26,'#0C1117')}<span style="font-family:'Unbounded',sans-serif;font-weight:800;font-size:15px;color:${th.text};letter-spacing:-.01em;">I STØDET</span>`;
  if(app.state.theme==='play') return `${ellySVG('mid',26,'#2a2140')}<span style="font-family:'Baloo 2',sans-serif;font-weight:800;font-size:19px;color:${th.text};">I stødet</span>`;
  return `${ellySVG('mid',26,'#11352b')}<span style="font-family:'Fredoka',sans-serif;font-weight:600;font-size:18px;color:${th.text};">I stødet</span>`;
}
function pointView(V){
  const th=THEMES[app.state.theme];
  const g=loadGamify();
  const todayKwh=loadConsumption()[keyOf(new Date())];
  const smart = (todayKwh && V.hasToday) ? smartScore(todayKwh, V.todayList.map(x=>x.total)) : V.score;
  const stat=(icon,val,lbl,col,icol)=>`<div style="flex:1;min-width:0;background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:13px 12px;display:flex;align-items:center;gap:9px;">
    <span style="font-size:22px;width:24px;text-align:center;">${fa(icon,icol||th.accent)}</span>
    <div style="min-width:0;"><div style="font-weight:800;font-size:20px;color:${th.text};line-height:1;">${val}</div><div style="font-size:10.5px;font-weight:700;letter-spacing:.04em;color:${col||th.muted};margin-top:3px;">${lbl}</div></div></div>`;
  const badge=(emoji,label,active)=>`<div style="flex:1;text-align:center;background:${active?th.sheetBg:th.surface};border:1.5px ${active?'solid '+th.border:'dashed '+th.border};border-radius:16px;padding:13px 6px;${active?'':'opacity:.5;'}"><div style="font-size:24px;">${emoji}</div><div style="font-size:10.5px;font-weight:700;color:${th.muted};margin-top:4px;">${label}</div></div>`;
  return `<div class="pane">
    ${compactHeader(th,brandFor(th),gearBtn(th,th.sheetBg,app.state.theme==='bold'?'10px':'50%'))}
    <div style="display:flex;gap:8px;">
      ${stat('trophy',g.totalPoint||0,'POINT',null,th.accent)}
      ${stat('fire',(g.streak||STREAK||0),'DAGES STIME',null,th.pal[2])}
      ${stat('gauge',smart,'SMART-SCORE',null,th.accent)}
    </div>
    <button onclick="openPointInfo()" style="width:100%;margin-top:10px;padding:11px 14px;border:1px solid ${th.border};background:${th.surface};border-radius:14px;font:inherit;cursor:pointer;color:${th.text};display:flex;align-items:center;gap:10px;text-align:left;">
      ${fa('lightbulb',th.accent,16)}<span style="flex:1;font-weight:700;font-size:13px;">Sådan virker point</span><span style="color:${th.accent};font-weight:800;">→</span></button>
    <div style="background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:14px 16px;margin-top:12px;">
      <div style="font-size:11px;font-weight:800;letter-spacing:.06em;color:${th.muted};margin-bottom:6px;">SPAR I DAG</div>
      <div style="display:flex;align-items:baseline;gap:8px;"><span style="font-weight:800;font-size:24px;color:${th.accent};">op til ${V.savedToday} kr</span></div>
      <div style="font-size:12px;color:${th.muted};margin-top:4px;line-height:1.4;">ved at flytte bil, vask og opvask til de billige timer.</div>
    </div>
    <h3 style="font-weight:700;font-size:14px;color:${th.text};margin:16px 0 9px;">Badges</h3>
    <div style="display:flex;gap:8px;">${badge('🌙','Natteravn',g.badges?.natteravn)}${badge('💰','Sparefugl',g.badges?.sparefugl)}${badge('⭐','30 dage',g.badges?.dage30)}${badge('🔮','Sandsiger',g.badges?.sandsiger)}</div>
    ${claimsHTML(th)}
  </div>`;
}

function wizardHTML(th){
  const step=app.state.wizardStep;
  const msg=app.state.wizardMsg;
  const card=inner=>`<div style="background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:16px 16px 18px;">${inner}</div>`;
  const indicator=`<div style="font-size:11px;font-weight:800;letter-spacing:.08em;color:${th.muted};margin-bottom:12px;">TRIN ${step+1} AF 4</div>`;
  const pBtn=(label,fn)=>`<button onclick="${fn}" style="width:100%;margin-top:14px;padding:12px;border:none;border-radius:13px;background:${th.accent};color:${th.accentText};font:inherit;font-weight:800;font-size:14px;cursor:pointer;">${label}</button>`;
  const para=t=>`<p style="margin:0;font-size:13.5px;line-height:1.55;color:${th.text};">${t}</p>`;
  let body='';
  if(step===0){
    body=para('Her henter du dit eget times-forbrug fra <strong>Eloverblik</strong> — Energinets gratis tjeneste. Så kan appen se hvornår du faktisk bruger strøm og belønne dig for at flytte forbrug til de billige timer.<br><br>Du skal bruge <strong>MitID</strong> og oprette et gratis <strong>token</strong> (en adgangsnøgle). Det tager ca. 1 minut. Dine data bliver kun på din egen enhed.')
      + pBtn('Kom i gang','wizardNext()');
  } else if(step===1){
    body=`<p style="margin:0 0 10px;font-weight:800;font-size:14px;color:${th.text};">Sådan opretter du dit token</p>
      <div style="font-size:13px;line-height:1.5;color:${th.text};display:flex;flex-direction:column;gap:8px;">
        <div><strong>1.</strong> Åbn <strong>eloverblik.dk</strong> og log ind med <strong>MitID</strong>.</div>
        <div><strong>2.</strong> Klik på <strong>menu-ikonet (☰)</strong> øverst til højre.</div>
        <div><strong>3.</strong> Vælg <strong>API-adgang</strong>.</div>
        <div><strong>4.</strong> Klik <strong>+ Opret token</strong> (øverst til højre).</div>
        <div><strong>5.</strong> Giv det et navn (fx «I stødet») og opret det.</div>
        <div><strong>6.</strong> <strong>Kopiér</strong> token-teksten (den lange nøgle).</div>
        <div><strong>7.</strong> Kom tilbage hertil og indsæt den nedenfor.</div>
      </div>
      <a href="https://eloverblik.dk" target="_blank" rel="noopener" style="display:block;text-align:center;margin-top:14px;padding:12px;border:1px solid ${th.border};border-radius:13px;background:transparent;color:${th.text};font:inherit;font-weight:800;font-size:14px;text-decoration:none;cursor:pointer;">Åbn eloverblik.dk →</a>`
      + pBtn('Jeg har kopieret mit token','wizardNext()');
  } else if(step===2){
    const isErr=msg.startsWith('Fejl');
    const msgHTML=msg?`<div style="margin-top:10px;font-size:12.5px;font-weight:600;color:${isErr?th.pal[2]:th.muted};">${msg}</div>`:'';
    body=`<p style="margin:0 0 4px;font-weight:800;font-size:14px;color:${th.text};">Indsæt dit token</p>
      <p style="margin:0 0 10px;font-size:12.5px;line-height:1.5;color:${th.muted};">Den lange tekststreng du lige kopierede fra Eloverblik (Datadeling → Kopier til udklipsholder). Indsæt hele teksten her:</p>
      <textarea id="ev-token" rows="3" placeholder="Indsæt dit Eloverblik-token her…" style="width:100%;box-sizing:border-box;resize:vertical;border:1px solid ${th.border};border-radius:12px;background:${th.bg};color:${th.text};font:inherit;font-size:13px;padding:10px;"></textarea>${msgHTML}`
      + pBtn('Test forbindelse','testEloverblik()');
  } else {
    const mps=app.state.meteringPoints||[];
    const items=mps.length
      ? mps.map(m=>{
          const sid=String(m.id).replace(/[^0-9A-Za-z_-]/g,'');
          return `<button onclick="pickMeteringPoint('${sid}')" style="display:block;width:100%;text-align:left;margin-bottom:8px;padding:12px 14px;border:1px solid ${th.border};border-radius:13px;background:${th.bg};color:${th.text};font:inherit;font-weight:700;font-size:13.5px;cursor:pointer;">${esc(m.label)}</button>`;
        }).join('')
      : `<div style="font-size:12.5px;color:${th.muted};">Ingen målepunkter fundet.</div>`;
    body=`<p style="margin:0 0 12px;font-size:13.5px;line-height:1.55;color:${th.text};">Vælg det målepunkt du vil bruge.</p>${items}`;
  }
  return card(indicator+body);
}

/* ===================== FORBRUGS-ANALYSE VIEW ===================== */
function miniBars(rows, th, opts){
  opts=opts||{};
  const vals=rows.map(r=>r.kwh==null?0:r.kwh);
  const max=Math.max(...vals,0.001);
  const colorByTier=opts.tier && opts.prices;
  let lo=0,hi=1;
  if(colorByTier){ [lo,hi]=loHi(opts.prices); }
  const H=opts.h||120;
  const bars=rows.map((r,i)=>{
    const k=r.kwh==null?0:r.kwh;
    const ht=r.kwh==null?2:Math.max(3,Math.round(k/max*100));
    let col=th.accent;
    if(r.kwh==null) col=th.border;
    else if(colorByTier && opts.prices[i]!=null) col=th.pal[tierOf(opts.prices[i],lo,hi)];
    else if(opts.compare) col=th.muted;
    const tip=opts.tip?opts.tip(r):`${r.key}: ${k.toFixed(2)} kWh`;
    return `<div title="${esc(tip)}" style="flex:1 1 0;min-width:0;height:${ht}%;background:${col};border-radius:4px 4px 2px 2px;opacity:${r.kwh==null?0.4:1};"></div>`;
  }).join('');
  return `<div style="display:flex;align-items:flex-end;gap:2px;height:${H}px;">${bars}</div>`;
}

function profileBars(values, th, labels){
  const max=Math.max(...values,0.001);
  const bars=values.map((v,i)=>{
    const ht=Math.max(3,Math.round(v/max*100));
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div title="${esc(labels[i])}: ${v.toFixed(2)} kWh" style="width:100%;height:${ht}%;background:${th.accent};border-radius:3px 3px 1px 1px;"></div>
    </div>`;
  }).join('');
  return `<div style="display:flex;align-items:flex-end;gap:3px;height:90px;">${bars}</div>`;
}

// Måneds-snit-CO₂ (g/kWh) fra cachede dag-snit i måneden → number eller null hvis ingen dage cachet.
function monthAvgCO2(region, year, monthIdx){
  let sum=0, n=0;
  const days=new Date(year, monthIdx+1, 0).getDate();
  for(let day=1; day<=days; day++){
    const avg=cachedCO2DailyAvg(region, `${year}-${monthIdx+1}-${day}`);
    if(avg!=null && avg>0){ sum+=avg; n++; }
  }
  return n ? sum/n : null;
}

// Klimaaftryk-kort for den valgte periode. Beregningsvej afhænger af forbrugets opløsning:
//  • Dag/Uge (Hour-agg): PRÆCIS — Σ time-forbrug × time-CO₂ pr. dag (elpriser_consumption × elpriser_co2).
//  • Måned/Uge-custom (Day-agg): ESTIMERET — Σ dags-forbrug × dag-snit-CO₂ (elpriser_consumption_daily
//    × elpriser_co2_daily) via co2FootprintDaily.
//  • Kvartal/År (Month-agg): ESTIMERET — Σ måneds-forbrug × måneds-snit-CO₂ (forbruget findes kun pr. måned dér).
// Alle veje tæller kun enheder hvor BÅDE forbrug OG CO₂ findes (ingen fabrikerede tal). Mangler alt →
// kompakt "henter"-linje.
function co2Card(th, type, range){
  const region=app.state.region;
  const today=startOfDay(new Date());
  const agg=aggForType(type);
  const precise = agg==='Hour';
  let totKg=0, totKwh=0, totG=0, withData=0, inRange=0, unit='dage';

  if(precise){
    // PRÆCIS: time-forbrug × time-CO₂.
    const cons=loadConsumption();
    for(let d=startOfDay(new Date(range.from)); d<=range.to && d<=today; d=addDays(d,1)){
      inRange++;
      const dk=keyOf(d);
      const kwh=cons[dk], co2=cachedCO2Day(region, dk);
      if(!kwh || !co2) continue;
      withData++;
      totKg+=co2Footprint(kwh, co2);
      for(let h=0;h<24;h++){ const k=+kwh[h]||0; totKwh+=k; totG+=k*(+co2[h]||0); }
    }
  } else if(agg==='Day'){
    // ESTIMERET (dag-niveau): dags-forbrug × dag-snit-CO₂ (co2FootprintDaily).
    const dc=loadDailyConsumption();
    const kwhMap={}, co2Map={}, dayKeys=[];
    for(let d=startOfDay(new Date(range.from)); d<=range.to && d<=today; d=addDays(d,1)){
      inRange++;
      const dk=keyOf(d);
      const kwh=dc[dk], avg=cachedCO2DailyAvg(region, dk);
      if(kwh==null || avg==null) continue;
      dayKeys.push(dk); kwhMap[dk]=kwh; co2Map[dk]=avg;
    }
    const r=co2FootprintDaily(kwhMap, co2Map, dayKeys);
    totKg=r.kg; totKwh=dayKeys.reduce((a,dk)=>a+(+kwhMap[dk]||0),0); totG=r.kg*1000; withData=r.days;
  } else {
    // ESTIMERET (måneds-niveau): måneds-forbrug × måneds-snit-CO₂ (kvartal/år har kun måneds-totaler).
    unit='måneder';
    const mc=loadMonthlyConsumption();
    const todayMonth=new Date(today.getFullYear(),today.getMonth(),1);
    for(let m=new Date(range.from.getFullYear(),range.from.getMonth(),1); m<=range.to && m<=todayMonth; m=addMonths(m,1)){
      inRange++;
      const mk=monthKey(m), kwh=mc[mk], avg=monthAvgCO2(region, m.getFullYear(), m.getMonth());
      if(kwh==null || avg==null) continue;
      withData++;
      const k=+kwh||0;
      totKg+=k*avg/1000; totKwh+=k; totG+=k*avg;
    }
  }

  const intensity=totKwh?totG/totKwh:0;
  // Ingen enheder med begge datakilder → diskret status (henter / ikke tilgængelig endnu).
  if(!withData){
    const fetching=inRange>0;
    return `<div style="background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:14px 16px;margin-top:16px;">
      <div style="font-size:13px;font-weight:700;color:${th.text};">${fa('leaf',th.pal[0])} Klimaaftryk</div>
      <div style="font-size:12px;color:${th.muted};margin-top:4px;line-height:1.45;">${fetching?'Henter klimaaftryk fra Energi Data Service…':'Klimaaftryk vises når der er forbrugsdata for perioden.'}</div></div>`;
  }
  const kgStr=totKg<10?totKg.toFixed(2):totKg.toFixed(1);
  const partial=withData<inRange
    ? `<div style="font-size:11px;color:${th.muted};margin-top:6px;line-height:1.4;">Baseret på ${withData} af ${inRange} ${unit} med data.</div>`
    : '';
  const estLabel=precise?'':` · estimeret (${agg==='Day'?'dag':'måneds'}-niveau)`;
  return `<div style="background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:14px 16px;margin-top:16px;">
    <div style="display:flex;align-items:baseline;justify-content:space-between;">
      <span style="font-size:13px;font-weight:800;color:${th.text};">${fa('leaf',th.pal[0])} Klimaaftryk</span>
      <span style="font-weight:800;font-size:16px;color:${th.pal[0]};">${kgStr} kg CO₂</span>
    </div>
    <div style="font-size:12px;color:${th.muted};margin-top:4px;">Snit-intensitet: <strong style="color:${th.text};">${Math.round(intensity)} g/kWh</strong> · kilde: Energi Data Service${estLabel}</div>
    ${partial}</div>`;
}

  const th=THEMES[app.state.theme];
  const ev=app.state.eloverblik;
  const head=compactHeader(th,brandFor(th),gearBtn(th,th.sheetBg,app.state.theme==='bold'?'10px':'50%'));

  if(!ev.refreshToken || !ev.meteringPointId){
    return `<div class="pane">${head}
      <div style="background:${th.surface};border:1px solid ${th.border};border-radius:20px;padding:28px 20px;text-align:center;margin-top:30px;">
        <div style="font-size:40px;margin-bottom:12px;">🔌</div>
        <p style="color:${th.text};font-size:15px;font-weight:700;margin:0 0 6px;">Forbind Eloverblik først</p>
        <p style="color:${th.muted};font-size:13px;line-height:1.5;margin:0 0 18px;">For at se din forbrugs-analyse skal du forbinde din Eloverblik-konto. Det tager ca. 1 minut.</p>
        <button onclick="openSettings()" style="border:none;background:${th.accent};color:${th.accentText};font:inherit;font-weight:800;font-size:14px;border-radius:14px;padding:12px 22px;cursor:pointer;">Forbind nu</button>
      </div></div>`;
  }

  const a=app.state.analyse;
  const range=periodRange(a.periodeType, a.fromKey, a.toKey);
  const agg=aggForType(a.periodeType);
  const { rows } = bucketsForPeriod(a.periodeType, range);

  // periodevælger — hurtigvalg
  const quick=[['dag','I dag'],['uge','Uge'],['maaned','Måned'],['kvartal','Kvartal'],['aar','År']];
  const qbtns=quick.map(([k,l])=>{const on=a.periodeType===k;
    return `<button onclick="setPeriode('${k}')" style="flex:1;padding:8px 0;border:none;border-radius:99px;font:inherit;font-weight:800;font-size:12px;cursor:pointer;background:${on?th.tab.on:'transparent'};color:${on?th.tab.onText:th.tab.off};">${l}</button>`;
  }).join('');
  const picker=`<div style="display:flex;gap:3px;padding:4px;background:${th.tab.track};border-radius:99px;">${qbtns}</div>`;

  // prev/next + label
  const navBtn=(sym,fn)=>`<button onclick="${fn}" style="width:34px;height:34px;border-radius:10px;border:1px solid ${th.border};background:${th.surface};color:${th.text};font:inherit;font-size:16px;font-weight:700;cursor:pointer;">${sym}</button>`;
  const nav=`<div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;">
    ${a.periodeType==='custom'?'<span></span>':navBtn('‹','navPeriode(-1)')}
    <span style="font-weight:800;font-size:15px;color:${th.text};text-transform:capitalize;text-align:center;flex:1;">${rangeLabel(a.periodeType,range)}</span>
    ${a.periodeType==='custom'?'<span></span>':navBtn('›','navPeriode(1)')}</div>`;

  // custom interval
  const fromVal=isoDate(range.from), toVal=isoDate(range.to);
  const custom=`<div style="display:flex;gap:8px;align-items:center;margin-top:12px;font-size:12px;color:${th.muted};">
    <span>Frit interval:</span>
    <input type="date" value="${fromVal}" onchange="setCustomFrom(this.value)" style="flex:1;min-width:0;border:1px solid ${th.border};background:${th.surface};color:${th.text};font:inherit;font-size:12px;border-radius:10px;padding:7px 8px;">
    <span>→</span>
    <input type="date" value="${toVal}" onchange="setCustomTo(this.value)" style="flex:1;min-width:0;border:1px solid ${th.border};background:${th.surface};color:${th.text};font:inherit;font-size:12px;border-radius:10px;padding:7px 8px;"></div>`;

  if(app.state.analyseLoading){
    return `<div class="pane">${head}${picker}${nav}
      <div class="skel" style="padding:40px 20px;">${ellySVG('charge',56,th.text)}<div style="margin-top:14px;line-height:1.5;">Henter dit forbrug fra Eloverblik — det kan tage et øjeblik (deres system er nogle gange langsomt)…</div></div></div>`;
  }

  // Render fra cachen uanset om en frisk hentning lykkedes. Kun når der INTET er i
  // cachen for perioden viser vi en blokkerende empty-state.
  const hasData=rows.some(r=>r.kwh!=null);
  if(!hasData){
    const failed=!!app.state.analyseMsg;
    const transient=app.state.analyseMsg && app.state.analyseMsg.indexOf('langsomt')>=0;
    const msg=transient
      ? 'Eloverbliks system svarer langsomt lige nu — vi henter dit forbrug så snart det er tilgængeligt.'
      : failed
        ? 'Kunne ikke hente dit forbrug — tjek din Eloverblik-forbindelse.'
        : 'Ingen forbrugsdata for denne periode endnu (data er typisk 1-2 dage forsinket).';
    const retry=failed?`<button onclick="loadAnalyseData(true)" style="margin-top:14px;padding:11px 22px;border:none;border-radius:13px;background:${th.accent};color:${th.accentText};font:inherit;font-weight:800;font-size:13.5px;cursor:pointer;">Prøv igen</button>`:'';
    return `<div class="pane">${head}${picker}${nav}${a.periodeType==='custom'?custom:''}
      <div style="background:${th.surface};border:1px solid ${th.border};border-radius:18px;padding:22px 18px;margin-top:18px;text-align:center;color:${th.muted};font-size:13.5px;line-height:1.5;">${esc(msg)}${retry}</div></div>`;
  }
  // Diskret note over grafen når seneste hentning fejlede men cache har data.
  const staleNote=app.state.analyseMsg
    ? `<div style="display:flex;align-items:center;gap:6px;margin-top:12px;font-size:11.5px;color:${th.muted};line-height:1.4;"><span>⚠️</span><span>${esc(app.state.analyseMsg)}</span></div>`
    : '';

  // nøgletal — periodTotals over de udfyldte buckets (time/dag/måned)
  const hourArr=(agg==='Hour'?(loadConsumption()[keyOf(range.from)]||null):null);
  const bucketMap={};
  for(const r of rows){ if(r.kwh!=null) bucketMap[r.key]=r.kwh; }
  const totals=periodTotals(bucketMap);
  const total=totals.total;
  const maxRow=rows.find(r=>r.key===totals.maxKey)||null;

  // tier-farvning for enkelt-dag
  const prices=(agg==='Hour')?(loadDayPrices()[keyOf(range.from)]||null):null;
  const graph=miniBars(rows, th, {
    h:140, tier:!!prices, prices,
    tip:r=> agg==='Hour' ? `kl ${r.key}: ${(r.kwh||0).toFixed(2)} kWh`
          : agg==='Month' ? `${MONTHS_DK[r.date.getMonth()]}: ${(r.kwh||0).toFixed(1)} kWh`
          : `${r.date.toLocaleDateString('da-DK',{day:'numeric',month:'short'})}: ${(r.kwh||0).toFixed(2)} kWh`
  });
  const axisLbl=(agg==='Hour')
    ? `<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;font-weight:600;color:${th.axis};"><span>00</span><span>06</span><span>12</span><span>18</span><span>24</span></div>`
    : `<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;font-weight:600;color:${th.axis};"><span>${esc(rangeLabel(a.periodeType,range))}</span></div>`;

  const maxLabel = maxRow ? (agg==='Hour'?`kl ${maxRow.key}`:(agg==='Month'?MONTHS_DK[maxRow.date.getMonth()]:maxRow.date.toLocaleDateString('da-DK',{day:'numeric',month:'short'}))) : '—';
  const unitName = agg==='Hour'?'time':(agg==='Month'?'måned':'dag');
  const countLabel = agg==='Hour'?'Timer m. data':(agg==='Month'?'Mdr. m. data':'Dage m. data');
  const stats=`<div style="display:flex;gap:8px;margin-top:16px;">
    ${statCard(th,'Total',`${total.toFixed(total<100?1:0)} kWh`)}
    ${statCard(th,'Snit/'+unitName,`${totals.avgPerDay.toFixed(totals.avgPerDay<10?2:1)} kWh`)}
  </div>
  <div style="display:flex;gap:8px;margin-top:8px;">
    ${statCard(th,'Højeste '+unitName,maxRow?`${maxRow.kwh.toFixed(agg==='Month'?0:1)} kWh`:'—',maxLabel)}
    ${statCard(th,countLabel,`${totals.days}`)}
  </div>`;

  // år-over-år
  const lyRange={ from:new Date(range.from.getFullYear()-1,range.from.getMonth(),range.from.getDate()),
                  to:new Date(range.to.getFullYear()-1,range.to.getMonth(),range.to.getDate()) };
  const ly=bucketsForPeriod(a.periodeType, lyRange);
  const lyTotal=ly.rows.filter(r=>r.kwh!=null).reduce((x,y)=>x+y.kwh,0);
  const lyHas=ly.rows.some(r=>r.kwh!=null);
  let yoy='';
  if(lyHas){
    const pc=pctChange(total, lyTotal);
    const diff=total-lyTotal;
    const up=diff>0;
    const col=up?th.pal[2]:th.pal[0];
    const arrow=up?'▲':'▼';
    yoy=`<div style="background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:14px 16px;margin-top:16px;">
      <div style="font-size:11px;font-weight:800;letter-spacing:.06em;color:${th.muted};margin-bottom:8px;">SAMME PERIODE SIDSTE ÅR</div>
      <div style="display:flex;align-items:baseline;justify-content:space-between;">
        <span style="font-size:13px;color:${th.text};">Sidste år: <strong>${lyTotal.toFixed(lyTotal<100?1:0)} kWh</strong></span>
        <span style="font-weight:800;font-size:15px;color:${col};">${arrow} ${pc==null?'—':(Math.abs(pc).toFixed(0)+' %')}</span>
      </div>
      <div style="font-size:12px;color:${th.muted};margin-top:4px;">${up?'+':''}${diff.toFixed(diff<10&&diff>-10?1:0)} kWh vs. sidste år</div>
    </div>`;
  } else {
    yoy=`<div style="background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:14px 16px;margin-top:16px;font-size:12.5px;color:${th.muted};">Ingen data for samme periode sidste år (endnu).</div>`;
  }

  // profiler — kun meningsfulde for flere dage (Day-aggregering)
  let profiles='';
  if(agg==='Day'){
    const dc=loadDailyConsumption();
    const periodDayMap={};
    for(const r of rows){ if(r.kwh!=null) periodDayMap[r.key]=r.kwh; }
    const wp=weekdayProfile(periodDayMap);
    const wdLbl=['Søn','Man','Tir','Ons','Tor','Fre','Lør'];
    // reorder man-søn for visning
    const order=[1,2,3,4,5,6,0];
    const wpVals=order.map(i=>wp[i]), wpLabels=order.map(i=>wdLbl[i]);
    profiles=`<div style="background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:14px 16px;margin-top:16px;">
      <div style="font-size:11px;font-weight:800;letter-spacing:.06em;color:${th.muted};margin-bottom:10px;">UGEDAGSPROFIL (snit pr. ugedag)</div>
      ${profileBars(wpVals,th,wpLabels)}
      <div style="display:flex;gap:3px;margin-top:5px;">${wpLabels.map(l=>`<span style="flex:1;text-align:center;font-size:9.5px;font-weight:600;color:${th.axis};">${l}</span>`).join('')}</div>
    </div>`;
  } else if(agg==='Hour' && hourArr){
    const dp=dayProfile([hourArr]);
    profiles=`<div style="background:${th.surface};border:1px solid ${th.border};border-radius:16px;padding:14px 16px;margin-top:16px;">
      <div style="font-size:11px;font-weight:800;letter-spacing:.06em;color:${th.muted};margin-bottom:10px;">DØGNPROFIL (kWh pr. time)</div>
      ${profileBars(dp,th,Array.from({length:24},(_,i)=>'kl '+pad(i)))}
      <div style="display:flex;justify-content:space-between;margin-top:5px;font-size:9.5px;font-weight:600;color:${th.axis};"><span>00</span><span>06</span><span>12</span><span>18</span><span>23</span></div>
    </div>`;
  }

  // klimaaftryk — rigtige tal fra Energi Data Service (CO2Emis). Kræver TIME-forbrug + time-CO₂
  // for de samme dage; vi summerer kun dage hvor begge findes (ingen fabrikerede tal).
  const klima=co2Card(th, a.periodeType, range);

  const csvBtn=`<button onclick="exportForbrugCSV()" style="width:100%;margin-top:18px;padding:13px;border:1px solid ${th.border};background:${th.surface};color:${th.text};font:inherit;font-weight:800;font-size:14px;border-radius:14px;cursor:pointer;">⬇︎ Download som CSV</button>`;

  const legendRow = prices ? `<div style="display:flex;gap:14px;margin-top:10px;font-size:11px;font-weight:600;color:${th.muted};">
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:3px;background:${th.pal[0]};"></span>Billig</span>
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:3px;background:${th.pal[1]};"></span>Middel</span>
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:3px;background:${th.pal[2]};"></span>Dyr</span></div>` : '';

  const showMore=app.state.showProfiles;
  const toggle=`<button onclick="toggleProfiles()" style="width:100%;margin-top:12px;padding:10px;border:1px solid ${th.border};background:${th.surface};color:${th.text};font:inherit;font-weight:700;font-size:13px;border-radius:13px;cursor:pointer;">${showMore?'Skjul detaljer ▲':'Sammenlign & profiler ▼'}</button>`;
  const more = showMore ? `${custom}${yoy}${profiles}${klima}${csvBtn}` : '';
  return `<div class="pane">${head}
    ${picker}${nav}${staleNote}
    <div style="background:${th.surface};border:1px solid ${th.border};border-radius:20px;padding:14px 16px;margin-top:14px;">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;">
        <span style="font-weight:800;font-size:14px;color:${th.text};">Forbrug</span>
        <span style="font-weight:800;font-size:16px;color:${th.accent};">${total.toFixed(total<100?1:0)} kWh</span></div>
      ${graph}${axisLbl}${legendRow}
    </div>
    ${stats}
    ${toggle}
    ${more}
  </div>`;
}

/* ===================== RENDER ===================== */
// Render fane-indhold (uden skal). app.lastV sættes så logClaim m.fl. virker.
function tabContent(){
  const th=THEMES[app.state.theme];
  if(app.loading) return `<div class="skel">${ellySVG('charge',72,th.text)}<div style="margin-top:14px;">Henter elpriser…</div></div>`;
  if(app.error) return `<div style="padding:40px 6px;text-align:center;color:${th.text};">
      <div style="font-size:40px;margin-bottom:10px;">⚡</div>
      <p style="color:${th.muted};line-height:1.6;">Kunne ikke hente priser (${app.error}).<br>Tjek forbindelsen.</p>
      <button onclick="load()" style="margin-top:14px;padding:12px 22px;border:none;border-radius:14px;background:${th.accent};color:${th.accentText};font:inherit;font-weight:800;cursor:pointer;">Prøv igen</button></div>`;
  if(app.state.tab==='forbrug') return forbrugView();
  const V=computeView();
  app.lastV=V;
  if(app.state.tab==='point') return pointView(V);
  if(app.state.tab==='mere')  return mereView();
  // 'nu' (default) — pr. tema
  return app.state.theme==='bold'?viewBold(V):(app.state.theme==='play'?viewPlay(V):viewSoft(V));
}
// Ikke-blokkerende toast over fanelinjen — vises når app.state.toast er sat (ryddes efter ~3s).
function toastHTML(th){
  if(!app.state.toast) return '';
  return `<div role="status" style="position:fixed;left:50%;transform:translateX(-50%);bottom:calc(64px + env(safe-area-inset-bottom) + 12px);z-index:50;max-width:380px;width:calc(100% - 40px);background:${th.accent};color:${th.accentText};font-size:12.5px;font-weight:700;line-height:1.4;border-radius:14px;padding:11px 16px;box-shadow:0 10px 30px -10px rgba(0,0,0,.45);animation:pop .22s ease;text-align:center;">${esc(app.state.toast)}</div>`;
}
function render(){
  const th=THEMES[app.state.theme];
  document.body.style.background=th.bg;
  document.getElementById('theme-color').setAttribute('content',th.bg);
  const root=document.getElementById('app');
  root.innerHTML=`<div class="tabcontent">${tabContent()}</div>${tabBar(th)}${toastHTML(th)}`;
  const sr=document.getElementById('sheet-root');
  if(app.state.sheet){ document.getElementById('sheet').innerHTML=(app.state.sheet==='pointInfo'?pointInfoHTML():sheetHTML()); sr.classList.add('open'); }
  else sr.classList.remove('open');
}

/* ===================== ACTIONS (global) ===================== */
function setTab(t){
  app.state.tab=t;
  app.state.selectedHour=null;
  app.state.sheet=null;
  if(t==='forbrug'){
    app.state.showProfiles=false;
    app.state.analyse={ periodeType:'maaned', fromKey:null, toKey:null };
    render();
    loadAnalyseData();
    return;
  }
  render();
}
function toggleProfiles(){ app.state.showProfiles=!app.state.showProfiles; render(); }
function setPeriode(type){
  app.state.analyse.periodeType=type;
  app.state.analyse.fromKey=null; app.state.analyse.toKey=null;
  render(); loadAnalyseData();
}
function navPeriode(dir){
  const a=app.state.analyse;
  const range=periodRange(a.periodeType, a.fromKey, a.toKey);
  let anchor;
  if(a.periodeType==='dag') anchor=addDays(range.from, dir);
  else if(a.periodeType==='uge') anchor=addDays(range.from, dir*7);
  else if(a.periodeType==='maaned') anchor=new Date(range.from.getFullYear(),range.from.getMonth()+dir,1);
  else if(a.periodeType==='kvartal') anchor=new Date(range.from.getFullYear(),range.from.getMonth()+dir*3,1);
  else if(a.periodeType==='aar') anchor=new Date(range.from.getFullYear()+dir,0,1);
  else return;
  a.fromKey=keyOf(anchor); a.toKey=null;
  render(); loadAnalyseData();
}
function setCustomFrom(v){
  if(!v) return;
  const a=app.state.analyse; a.periodeType='custom';
  a.fromKey=keyOf(new Date(v)); if(!a.toKey) a.toKey=a.fromKey;
  render(); loadAnalyseData();
}
function setCustomTo(v){
  if(!v) return;
  const a=app.state.analyse; a.periodeType='custom';
  a.toKey=keyOf(new Date(v)); if(!a.fromKey) a.fromKey=a.toKey;
  render(); loadAnalyseData();
}
function exportForbrugCSV(){
  const a=app.state.analyse;
  const range=periodRange(a.periodeType, a.fromKey, a.toKey);
  const agg=aggForType(a.periodeType);
  const { rows }=bucketsForPeriod(a.periodeType, range);
  let csvRows;
  if(agg==='Hour'){
    const dk=keyOf(range.from);
    const prices=loadDayPrices()[dk]||null;
    csvRows=rows.filter(r=>r.kwh!=null).map(r=>{
      const o={ dato:isoDate(range.from), time:r.hour, kwh:Number(r.kwh.toFixed(3)) };
      if(prices && prices[r.hour]!=null) o.kr=Number((prices[r.hour]/100*r.kwh).toFixed(2));
      return o;
    });
  } else {
    csvRows=rows.filter(r=>r.kwh!=null).map(r=>({ dato:r.key, kwh:Number(r.kwh.toFixed(3)) }));
  }
  const csv=toCSV(csvRows);
  const blob=new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8;' });
  const url=URL.createObjectURL(blob);
  const aEl=document.createElement('a');
  aEl.href=url; aEl.download=`forbrug-${isoDate(range.from)}_${isoDate(range.to)}.csv`;
  document.body.appendChild(aEl); aEl.click(); document.body.removeChild(aEl);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function openSettings(){app.state.sheet='settings';render();}
function openPointInfo(){app.state.sheet='pointInfo';render();}
function closeSettings(){app.state.sheet=null;render();}
function setTheme(t){app.state.theme=t;saveState();render();}
function setRegion(r){app.state.region=r;saveState();load();}
function setDso(key){ app.state.dso=key; saveState(); render(); }
function adjCustom(seasonKey,band,d){
  const v=app.state.customTariff[seasonKey][band];
  app.state.customTariff[seasonKey][band]=Math.max(0,Math.min(400,v+d));
  saveState(); render();
}
function wizardNext(){ app.state.wizardStep=Math.min(3, app.state.wizardStep+1); app.state.wizardMsg=''; render(); }
async function testEloverblik(){
  const ta=document.getElementById('ev-token');
  const token=(ta && ta.value || '').trim();
  if(!token){ app.state.wizardMsg='Fejl: indsæt dit token først.'; render(); return; }
  app.state.wizardMsg='Tester forbindelse…'; render();
  try{
    const access=await getAccessToken(token);
    const mps=await getMeteringPoints(access);
    app.state.eloverblik.refreshToken=token;       // tentatively store; finalized on pick
    app.state.eloverblik.accessToken=access;
    app.state.eloverblik.accessTokenExp=Date.now()+23*3600*1000;
    app.state.meteringPoints=mps;
    app.state.wizardMsg='';
    app.state.wizardStep=3;
    if(mps.length===1){ pickMeteringPoint(mps[0].id); return; }
    render();
  }catch(e){
    app.state.eloverblik.refreshToken='';
    app.state.wizardMsg='Fejl: dit token virker ikke — tjek at du fik HELE teksten med (den er meget lang). Tokens udløber også efter et stykke tid; opret evt. et nyt.';
    render();
  }
}
function pickMeteringPoint(id){
  app.state.eloverblik.meteringPointId=id;
  saveState();
  app.state.wizardStep=0; app.state.wizardMsg='';
  render();
}
function disconnectEloverblik(){
  app.state.eloverblik={ refreshToken:'', meteringPointId:'', accessToken:'', accessTokenExp:0 };
  app.state.meteringPoints=[]; app.state.wizardStep=0; app.state.wizardMsg='';
  saveState(); render();
}
function setChartTab(t){app.state.chartTab=t;app.state.selectedHour=null;render();}
function selectHour(h){ app.state.selectedHour = (h===null || h===app.state.selectedHour) ? null : h; render(); }
function adjMarkup(d){app.state.markup=Math.max(0,Math.min(60,app.state.markup+d));saveState();render();}
function adjAp(key,d){const lim={bilH:[1,12],opvaskH:[1,6],vaskH:[1,6]}[key];
  app.state[key]=Math.max(lim[0],Math.min(lim[1],app.state[key]+d));saveState();render();}
function doRefresh(btn){
  if(btn){btn.classList.add('spin');setTimeout(()=>btn.classList.remove('spin'),700);}
  // Manuel opdatering forcerer en forbrugs-hentning forbi stale-guard'en.
  load();
  fetchRecentConsumption(true);
  if(app.state.tab==='forbrug') loadAnalyseData(true);
}
function logClaim(apparat){
  const V=app.lastV; if(!V) return;
  const now=new Date();
  const id=`${keyOf(now)}-${apparat}-${now.getHours()}`;
  const existing=loadClaims();
  // Toggle: hvis denne markering allerede findes → fjern den (knappen er on/off).
  if(existing.some(c=>c.id===id)){
    saveClaims(existing.filter(c=>c.id!==id));
    app.state.toast='';
    render();
    return;
  }
  const varighed={bil:app.state.bilH,opvask:app.state.opvaskH,vask:app.state.vaskH}[apparat]||1;
  const prices=Array(24).fill(0); V.todayList.forEach(x=>{ if(x.h>=0&&x.h<24) prices[x.h]=x.total; });
  const claim={ id, apparat, dato:keyOf(now), startHour:now.getHours(), varighed, tierVedStart:V.nowTier, prices, status:'pending', point:0 };
  existing.push(claim); saveClaims(existing);
  app.state.toast='Sat i gang — verificeres når dit forbrug er klar (1-2 dage)';
  render();
  clearTimeout(app.toastTimer);
  app.toastTimer=setTimeout(()=>{ app.state.toast=''; render(); }, 3000);
}
window.logClaim=logClaim;
window.openSettings=openSettings;window.openPointInfo=openPointInfo;window.closeSettings=closeSettings;window.setTheme=setTheme;
window.setRegion=setRegion;window.setChartTab=setChartTab;window.adjMarkup=adjMarkup;window.adjAp=adjAp;
window.setDso=setDso;window.adjCustom=adjCustom;
window.selectHour=selectHour;
window.wizardNext=wizardNext; window.testEloverblik=testEloverblik;
window.pickMeteringPoint=pickMeteringPoint; window.disconnectEloverblik=disconnectEloverblik;
window.doRefresh=doRefresh;window.load=load;
window.setTab=setTab;window.toggleProfiles=toggleProfiles;
window.setPeriode=setPeriode;window.navPeriode=navPeriode;window.loadAnalyseData=loadAnalyseData;
window.setCustomFrom=setCustomFrom;window.setCustomTo=setCustomTo;
window.exportForbrugCSV=exportForbrugCSV;

/* ===================== INIT ===================== */
loadState();
render();
load();
document.addEventListener('visibilitychange',()=>{if(!document.hidden)load();});
if(!window.Capacitor?.isNativePlatform() && 'serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
